<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Wise Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
:root{
  --bg:#f4f6fb;--surface:#fff;--surface2:#f0f3fa;--border:#e2e8f0;
  --text:#1e2535;--text2:#4a5568;--text3:#94a3b8;
  --blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--teal:#06b6d4;
  --sh:0 2px 8px rgba(30,37,53,.08);--shm:0 4px 16px rgba(30,37,53,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
/* header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:var(--sh);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo h1{font-size:14px;font-weight:700;}
.logo .sub{font-size:10px;color:var(--text3);}
.badge{font-size:10px;background:#fef2f2;color:var(--red);border:1px solid #fecaca;padding:2px 8px;border-radius:20px;margin-left:8px;}
/* filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:8px;align-items:center;}
.fg{display:flex;align-items:center;gap:4px;}
.fg label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
select,input[type=text],input[type=number]{font-size:11px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;outline:none;cursor:pointer;transition:border .15s;box-shadow:var(--sh);}
select:focus,input:focus{border-color:var(--blue);}
input[type=text]{width:130px;}
/* multi-select dropdown */
.msel{position:relative;}
.msel-btn{font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer;box-shadow:var(--sh);min-width:120px;display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap;}
.msel-btn:hover{border-color:var(--text3);}
.msel-arr{font-size:9px;color:var(--text3);}
.msel-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shm);z-index:500;min-width:210px;overflow:hidden;}
.msel-panel.open{display:block;}
.msel-quick{display:flex;gap:4px;padding:7px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.msel-quick button{font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
.msel-quick button:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.msel-search{width:100%;border:none;border-bottom:1px solid var(--border);padding:7px 10px;font-size:11px;outline:none;font-family:inherit;box-shadow:none;border-radius:0;}
.msel-list{max-height:240px;overflow-y:auto;padding:3px 0;}
.msel-list::-webkit-scrollbar{width:4px;}.msel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msel-item{display:flex;align-items:center;gap:7px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--text2);}
.msel-item:hover{background:var(--surface2);}
.msel-item input[type=checkbox]{cursor:pointer;width:13px;height:13px;accent-color:var(--blue);flex-shrink:0;box-shadow:none;}
.msel-item.checked{color:var(--text);font-weight:600;}
.msel-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-top:1px solid var(--border);background:var(--surface2);}
.msel-count{font-size:10px;color:var(--text3);}
.msel-apply{font-size:11px;padding:5px 14px;border-radius:6px;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:inherit;font-weight:600;transition:background .15s;}
.msel-apply:hover{background:#2563eb;}
.dl-opt:hover{background:var(--surface2);}
/* period toggle (Week / Month) */
.period-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.period-btn{font-size:11px;padding:5px 12px;border:none;background:var(--surface);color:var(--text3);cursor:pointer;font-family:inherit;transition:all .15s;}
.period-btn.on{background:var(--blue);color:#fff;font-weight:600;}
/* action buttons */
.act-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;box-shadow:var(--sh);transition:all .15s;}
.act-btn:hover{background:var(--surface2);}
/* bucket pills */
.bucket-bar{display:flex;gap:6px;padding:7px 0 10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.bkt{font-size:11px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px;}
.bkt:hover{transform:translateY(-1px);border-color:var(--text3);}
.bkt.on.b-all{background:var(--purple);border-color:var(--purple);color:#fff;}
.bkt.on.b-ajio{background:var(--blue);border-color:var(--blue);color:#fff;}
.bkt.on.b-nonajio{background:var(--green);border-color:var(--green);color:#fff;}
.bkt-dot{width:7px;height:7px;border-radius:50%;}
/* tabs */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto;}
.tab{font-size:12px;padding:10px 18px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2.5px solid transparent;margin-bottom:-2px;font-family:inherit;white-space:nowrap;font-weight:500;transition:all .2s;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
.tab:hover:not(.on){color:var(--text2);background:var(--surface2);}
/* body */
.body{padding:16px 20px;max-width:1600px;margin:0 auto;}
/* kpi */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:14px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease both;}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shm);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.kpi.k-blue::before{background:linear-gradient(90deg,var(--blue),#60a5fa);}
.kpi.k-green::before{background:linear-gradient(90deg,var(--green),#34d399);}
.kpi.k-amber::before{background:linear-gradient(90deg,var(--amber),#fbbf24);}
.kpi.k-red::before{background:linear-gradient(90deg,var(--red),#f87171);}
.kpi.k-purple::before{background:linear-gradient(90deg,var(--purple),#a78bfa);}
.kpi.k-teal::before{background:linear-gradient(90deg,var(--teal),#22d3ee);}
.kpi .lb{font-size:10px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.kpi .vl{font-size:22px;font-weight:700;line-height:1;}
.kpi .sb{font-size:10px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh);animation:fadeUp .45s ease both;}
.card-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.card-hint{font-size:10px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr;}}
/* table */
.tw{overflow-x:auto;max-height:460px;overflow-y:auto;}
.tw::-webkit-scrollbar{width:5px;height:5px;}.tw::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th{font-size:10px;font-weight:700;color:var(--text3);padding:8px 10px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--surface);z-index:1;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;}
th:first-child{text-align:left;}
th:hover{color:var(--blue);}
th.sa{color:var(--blue);}
th .si{display:inline-block;font-size:9px;margin-left:3px;width:9px;}
td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);}
td:first-child{text-align:left;font-weight:600;color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis;}
tbody tr{animation:rowSlide .3s ease both;}
tbody tr:nth-child(1){animation-delay:.02s;}tbody tr:nth-child(2){animation-delay:.04s;}
tbody tr:nth-child(3){animation-delay:.06s;}tbody tr:nth-child(4){animation-delay:.08s;}
tbody tr:nth-child(5){animation-delay:.10s;}tbody tr:nth-child(6){animation-delay:.12s;}
tr:hover td{background:#f0f7ff;}
tbody tr:nth-child(even) td{background:#fafbff;}
tbody tr:nth-child(even):hover td{background:#f0f7ff;}
tr:last-child td{border-bottom:none;}
/* pills & badges */
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.pr{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.pg{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.pa{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
.pb{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.pn{background:#f8fafc;color:var(--text3);border:1px solid var(--border);}
.wow{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;}
.wow.up{background:#fef2f2;color:#dc2626;}.wow.dn{background:#f0fdf4;color:#16a34a;}.wow.neu{color:var(--text3);}
.bchip{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:4px;}
.bchip.ajio{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.bchip.nonajio{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.mbar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-left:6px;min-width:2px;}
/* loader / error */
.loader{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:20px 24px;color:#dc2626;font-size:12px;margin:20px 0;line-height:1.8;}
.err-box a{color:#2563eb;} .err-box code{background:#fff;padding:2px 5px;border-radius:3px;border:1px solid #fecaca;font-size:10px;}
/* section sub-filter bar */
.sub-filter{display:flex;align-items:center;gap:8px;padding:0 0 12px;flex-wrap:wrap;}
.sub-filter .fg label{font-size:10px;color:var(--text3);}
/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes rowSlide{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.sec{display:none;}.sec.on{display:block;}
/* viewer panel */
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#10b981;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 #10b98166;}50%{opacity:.8;box-shadow:0 0 0 6px #10b98100;}}
.viewer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.v-kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--sh);animation:fadeUp .4s ease both;}
.v-kpi .lb{font-size:10px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.v-kpi .vl{font-size:26px;font-weight:700;line-height:1;}
.v-kpi .sb{font-size:10px;color:var(--text3);margin-top:4px;}
.badge-live{font-size:10px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;padding:2px 8px;border-radius:20px;font-weight:700;}
.browser-icon{font-size:14px;margin-right:4px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-icon">📦</div>
      <div>
        <h1>Client Wise Summary Dashboard <span class="badge">Meesho &amp; FTPL Excluded</span></h1>
        <div class="sub" id="dataSubtitle">Loading data…</div>
      </div>
    </div>
    <div class="filter-bar">
      <!-- PERIOD toggle Week/Month -->
      <div class="fg"><label>View</label>
        <div class="period-toggle">
          <button class="period-btn on" id="periodWk" onclick="setPeriod('week')">Week</button>
          <button class="period-btn"    id="periodMo" onclick="setPeriod('month')">Month</button>
        </div>
      </div>
      <!-- WEEK multi-select (shown when period=week) -->
      <div class="fg" id="wkfGroup"><label>Weeks</label>
        <div class="msel" id="wkfWrap">
          <button type="button" class="msel-btn" onclick="toggleMsel('wkf')">Last 6 Weeks <span class="msel-arr">▾</span></button>
          <div class="msel-panel" id="wkfPanel">
            <div class="msel-quick">
              <button onclick="quickWeeks(6)">Last 6</button>
              <button onclick="quickWeeks(8)">Last 8</button>
              <button onclick="quickWeeks(12)">Last 12</button>
              <button onclick="quickWeeks(0)">All</button>
            </div>
            <div class="msel-list" id="wkfList"></div>
            <div class="msel-footer">
              <span id="wkfCount" class="msel-count">Last 6 weeks</span>
              <button class="msel-apply" onclick="applyWeeks()">Apply</button>
            </div>
          </div>
        </div>
      </div>
      <!-- MONTH multi-select (shown when period=month) -->
      <div class="fg" id="mofGroup" style="display:none"><label>Months</label>
        <div class="msel" id="mofWrap">
          <button type="button" class="msel-btn" onclick="toggleMsel('mof')">All Months <span class="msel-arr">▾</span></button>
          <div class="msel-panel" id="mofPanel">
            <div class="msel-quick">
              <button onclick="quickMonths(3)">Last 3</button>
              <button onclick="quickMonths(6)">Last 6</button>
              <button onclick="quickMonths(0)">All</button>
            </div>
            <div class="msel-list" id="mofList"></div>
            <div class="msel-footer">
              <span id="mofCount" class="msel-count">All months</span>
              <button class="msel-apply" onclick="applyMonths()">Apply</button>
            </div>
          </div>
        </div>
      </div>
      <!-- CLIENT multi-select -->
      <div class="fg"><label>Client</label>
        <div class="msel" id="clfWrap">
          <button type="button" class="msel-btn" onclick="toggleMsel('clf')">All Clients <span class="msel-arr">▾</span></button>
          <div class="msel-panel" id="clfPanel" style="min-width:260px">
            <input type="text" class="msel-search" id="clfSearch" placeholder="Search clients…" oninput="renderClientList()">
            <div class="msel-quick">
              <button onclick="quickClients(true)">Select All</button>
              <button onclick="quickClients(false)">Clear</button>
            </div>
            <div class="msel-list" id="clfList"></div>
            <div class="msel-footer">
              <span id="clfCount" class="msel-count">All clients</span>
              <button class="msel-apply" onclick="applyClients()">Apply</button>
            </div>
          </div>
        </div>
      </div>
      <!-- MIN DEL -->
      <div class="fg"><label>Min Del</label>
        <div class="msel" id="mndWrap">
          <button type="button" class="msel-btn" onclick="toggleMsel('mnd')" style="min-width:100px">No Min <span class="msel-arr">▾</span></button>
          <div class="msel-panel" id="mndPanel" style="min-width:200px">
            <div class="msel-quick" style="flex-wrap:wrap;gap:3px;">
              <button onclick="setMinDel(0)">No Min</button>
              <button onclick="setMinDel(50)">50+</button>
              <button onclick="setMinDel(100)">100+</button>
              <button onclick="setMinDel(500)">500+</button>
              <button onclick="setMinDel(1000)">1K+</button>
              <button onclick="setMinDel(5000)">5K+</button>
              <button onclick="setMinDel(10000)">10K+</button>
              <button onclick="setMinDel(50000)">50K+</button>
              <button onclick="setMinDel(100000)">100K+</button>
            </div>
            <div style="padding:7px 10px;border-top:1px solid var(--border);">
              <label style="font-size:10px;color:var(--text3);display:block;margin-bottom:3px;">Custom</label>
              <input type="number" id="mndCustom" placeholder="e.g. 2500" style="width:100%" min="0" onchange="setMinDel(this.value)">
            </div>
          </div>
        </div>
      </div>
      <!-- SEARCH -->
      <div class="fg"><label>Search</label>
        <input type="text" id="srch" placeholder="Search client…" oninput="go()">
      </div>
      <button class="act-btn" onclick="refreshData()">⟳ Refresh</button>
      <div class="msel" style="position:relative">
        <button class="act-btn" onclick="toggleDlMenu(event)" id="dlBtn">⬇ Download ▾</button>
        <div id="dlMenu" style="display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shm);z-index:500;min-width:200px;overflow:hidden">
          <button class="dl-opt" onclick="downloadPdf();closeDlMenu()" style="display:block;width:100%;text-align:left;padding:10px 14px;border:none;background:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text);border-bottom:1px solid var(--border)">📄 <strong>PDF</strong> — Shadowfax branded slides<br><span style="font-size:10px;color:var(--text3)">Full dashboard as landscape PDF</span></button>
          <button class="dl-opt" onclick="downloadPpt();closeDlMenu()" style="display:block;width:100%;text-align:left;padding:10px 14px;border:none;background:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text)">📊 <strong>PPT</strong> — Editable presentation<br><span style="font-size:10px;color:var(--text3)">Editable tables & text (Shadowfax format)</span></button>
        </div>
      </div>
    </div>
  </div>
  <div class="bucket-bar">
    <button class="bkt b-all on"     onclick="setBkt('all',this)"><span class="bkt-dot" style="background:#fff;opacity:.8"></span>Overall</button>
    <button class="bkt b-ajio"       onclick="setBkt('ajio',this)"><span class="bkt-dot" style="background:var(--blue)"></span>AJIO</button>
    <button class="bkt b-nonajio"    onclick="setBkt('nonajio',this)"><span class="bkt-dot" style="background:var(--green)"></span>Non Meesho Non AJIO</button>
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="sw('ov',this)">📋 Overview</button>
  <button class="tab"    onclick="sw('esc',this)">⚠️ Escalation %</button>
  <button class="tab"    onclick="sw('la',this)">✅ Loss Accepted %</button>
  <button class="tab"    onclick="sw('aov',this)">💰 AOV &amp; CPO</button>
  <button class="tab"    onclick="sw('trend',this)">📅 Trend View</button>
  <button class="tab"    onclick="sw('viewers',this)">👁 View History</button>
</div>
<div class="body">
  <div id="s-ov"      class="sec on"><div class="loader"><div class="spinner"></div>Loading…</div></div>
  <div id="s-esc"     class="sec"></div>
  <div id="s-la"      class="sec"></div>
  <div id="s-aov"     class="sec"></div>
  <div id="s-trend"   class="sec"></div>
  <div id="s-viewers" class="sec"></div>
</div>
<script>
// ── STATE ─────────────────────────────────────────────────────
let DB = null, TAB = 'ov', BKT = 'all', CH = {};
// Per-table sort state — key = table id, value = {col, dir}
const SORTS = {};
function getSort(tid, defCol='del', defDir='desc') {
  if (!SORTS[tid]) SORTS[tid] = {col:defCol, dir:defDir};
  return SORTS[tid];
}
let PERIOD    = 'week';   // 'week' | 'month'
let SEL_WEEKS = [], WEEK_MODE = 'last6';
let SEL_MONTHS= [], MONTH_MODE= 'all', PENDING_MONTHS = [];
let SEL_CLIENTS = [], MIN_DEL = 0;
const PAL = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1'];

// ── VIEW TRACKING ─────────────────────────────────────────────
// Detect browser, OS, device from userAgent
function detectEnv() {
  const ua = navigator.userAgent;
  let browser = 'Other', os = 'Other', device = 'Desktop';

  if (/Edg\//.test(ua))          browser = 'Edge';
  else if (/OPR\//.test(ua))     browser = 'Opera';
  else if (/Chrome\//.test(ua))  browser = 'Chrome';
  else if (/Firefox\//.test(ua)) browser = 'Firefox';
  else if (/Safari\//.test(ua))  browser = 'Safari';

  if (/Windows/.test(ua))        os = 'Windows';
  else if (/Mac OS X/.test(ua))  os = 'macOS';
  else if (/Linux/.test(ua))     os = 'Linux';
  else if (/Android/.test(ua))   os = 'Android';
  else if (/iPhone|iPad/.test(ua)) os = 'iOS';

  if (/Mobi|Android/.test(ua))   device = 'Mobile';
  else if (/iPad|Tablet/.test(ua)) device = 'Tablet';

  return { browser, os, device };
}

function getSessionId() {
  let sid = sessionStorage.getItem('cwdSid');
  if (!sid) {
    sid = Date.now().toString(36) + Math.random().toString(36).slice(2,7);
    sessionStorage.setItem('cwdSid', sid);
  }
  return sid;
}

async function logPageView() {
  try {
    const { browser, os, device } = detectEnv();
    const sid = getSessionId();
    const params = new URLSearchParams({
      action: 'logview',
      sid, browser, os, device,
      page: 'dashboard'
    });
    await fetch('/api/data?' + params.toString());
    console.log('[dash] view logged — sid=' + sid + ' browser=' + browser);
  } catch (e) {
    console.warn('[dash] logview failed (non-critical):', e.message);
  }
}

function browserIcon(b) {
  const icons = { Chrome:'🌐', Firefox:'🦊', Safari:'🧭', Edge:'🔷', Opera:'🔴' };
  return icons[b] || '🌐';
}
function osIcon(o) {
  const icons = { Windows:'🪟', macOS:'🍎', Linux:'🐧', Android:'🤖', iOS:'📱' };
  return icons[o] || '💻';
}
function deviceIcon(d) {
  return d === 'Mobile' ? '📱' : d === 'Tablet' ? '📟' : '🖥️';
}
function timeAgo(isoStr) {
  if (!isoStr) return '—';
  const diff = Math.round((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 60)  return diff + 's ago';
  if (diff < 3600) return Math.round(diff/60) + 'm ago';
  if (diff < 86400) return Math.round(diff/3600) + 'h ago';
  return Math.round(diff/86400) + 'd ago';
}
function isRecent(isoStr, secs) {
  return isoStr && (Date.now() - new Date(isoStr).getTime()) < secs * 1000;
}

async function apiFetch(action) {
  const url = '/api/data?action=' + action;
  console.log('[dash] GET', url);
  let r;
  try { r = await fetch(url); } catch(e) { throw new Error('Network error: ' + e.message); }
  const text = await r.text();
  if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + action + ': ' + text.slice(0,200));
  let j;
  try { j = JSON.parse(text); } catch(e) { throw new Error('Bad JSON: ' + text.slice(0,200)); }
  if (j && j.error) throw new Error(action + ' error: ' + j.error);
  return j;
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadData(retry) {
  retry = retry || 0;
  const msgs = ['⏳ Loading from Google Sheets…','⏳ Reading Base sheet — first load can take 20–30s…','⏳ Almost there…'];
  document.getElementById('s-ov').innerHTML = `<div class="loader"><div class="spinner"></div>${msgs[Math.min(retry,2)]}</div>`;
  document.getElementById('dataSubtitle').textContent = 'Loading…';
  try {
    const p = await apiFetch('all');
    const {meta, summary, wow, mom} = p;
    if (!meta?.clients?.length) throw new Error('No clients returned. Check /api/data?action=debug');
    DB = {meta, summary, wow, mom};
    SEL_WEEKS  = meta.weeks.slice(-6);  WEEK_MODE  = 'last6';
    SEL_MONTHS = [];  PENDING_MONTHS = [];  MONTH_MODE = 'all';   // empty = all months
    SEL_CLIENTS = []; MIN_DEL = 0;
    renderWeekList(); renderMonthList(); renderClientList();
    updateWeekBtnLabel(); updateMonthBtnLabel(); updateClientBtnLabel();
    const lastMo = meta.months[meta.months.length-1] || '';
    document.getElementById('dataSubtitle').textContent =
      'Jan 2026 – ' + lastMo + ' · ' + meta.clients.length + ' clients · Live · ' + new Date().toLocaleTimeString('en-IN');
    go();
    logPageView(); // non-blocking — log this session view
  } catch(e) {
    console.error('[dash] loadData fail attempt', retry+1, e);
    if (e.message.includes('504') && retry < 1) {
      document.getElementById('s-ov').innerHTML = '<div class="loader"><div class="spinner"></div>⏳ Timed out — retrying (cache warm-up)…</div>';
      await new Promise(r => setTimeout(r,4000));
      return loadData(retry+1);
    }
    showError(e.message);
  }
}
async function refreshData() { DB = null; await loadData(); }
function showError(msg) {
  document.getElementById('s-ov').innerHTML = `<div class="err-box">
    <strong>⚠ Could not load data</strong><br>${msg}<br><br>
    <strong>Debug:</strong><br>
    <a href="/api/data?action=debug" target="_blank">/api/data?action=debug</a> — sheet diagnostics<br>
    <a href="/api/data?action=all"   target="_blank">/api/data?action=all</a>   — full raw JSON<br><br>

}

// ── Utility: aggregate all data needed for exports ────────────
function buildExportData() {
  if (!DB) return null;
  const clients = filteredClients();
  const allWeeks = DB.wow.weeks;
  const allMonths = DB.meta.months;
  const wAgg = weekAgg(allWeeks, clients);
  const mAgg = monthAggForClients(allMonths, clients);

  // Quarterly rollup
  const mMap = {jan:1,feb:1,mar:1,apr:2,may:2,jun:2,jul:3,aug:3,sep:3,oct:4,nov:4,dec:4};
  const qMap = {};
  DB.mom.months.forEach(mo => {
    const m3 = mo.mo.slice(0,3).toLowerCase();
    const yr = mo.mo.includes("'") ? "20"+mo.mo.split("'")[1] : ""+new Date().getFullYear();
    const ql = "Q"+(mMap[m3]||1)+" "+yr;
    if (!qMap[ql]) qMap[ql] = {lbl:ql, del:0, esc:0, loss:0, lv:0};
    const filteredDel = clients.reduce((s,c)=>s+(mo.clients[c]?.del||0), 0);
    const filteredEsc = clients.reduce((s,c)=>s+(mo.clients[c]?.esc||0), 0);
    const filteredLoss= clients.reduce((s,c)=>s+(mo.clients[c]?.loss||0), 0);
    const filteredLv  = clients.reduce((s,c)=>s+(mo.clients[c]?.lv||0), 0);
    qMap[ql].del  += filteredDel;
    qMap[ql].esc  += filteredEsc;
    qMap[ql].loss += filteredLoss;
    qMap[ql].lv   += filteredLv;
  });
  const qOrder = ['Q1','Q2','Q3','Q4'];
  const qAgg = Object.values(qMap).sort((a,b)=>{
    const [qa,ya] = [a.lbl.split(' ')[0], a.lbl.split(' ')[1]];
    const [qb,yb] = [b.lbl.split(' ')[0], b.lbl.split(' ')[1]];
    return ya!==yb ? ya.localeCompare(yb) : qOrder.indexOf(qa)-qOrder.indexOf(qb);
  }).map(q => ({
    ...q,
    escP : q.del  > 0 ? q.esc  / q.del  * 100 : 0,
    laP  : q.esc  > 0 ? q.loss / q.esc  * 100 : 0,
    cpo  : q.del  > 0 ? q.lv   / q.del        : 0,
    aov  : q.loss > 0 ? q.lv   / q.loss       : 0
  }));

  // Client-level summary
  const ca = clientAgg(clients, allWeeks);
  const clientRows = Object.entries(ca)
    .sort((a,b)=>b[1].del - a[1].del)
    .map(([name,d])=>({name, ...d}));

  const now = new Date();
  const dateStr = now.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});

  return {
    clients, clientRows,
    weeks: allWeeks, wAgg,
    months: allMonths, mAgg,
    quarters: qAgg,
    dateStr,
    bucket: BKT === 'all' ? 'Overall' : BKT === 'ajio' ? 'AJIO' : 'Non-Meesho Non-AJIO'
  };
}

// ── PDF EXPORT (Shadowfax branded, landscape A3) ──────────────
async function downloadPdf() {
  if (!DB) { alert('Data not loaded yet.'); return; }
  const btn = document.getElementById('dlBtn');
  const orig = btn.innerHTML; btn.innerHTML = '⏳ PDF…'; btn.disabled = true;
  try {
    const data = buildExportData();
    const {jsPDF} = window.jspdf;
    const pdf = new jsPDF('l', 'pt', 'a3');
    const W = pdf.internal.pageSize.getWidth();
    const H = pdf.internal.pageSize.getHeight();
    const M = 32;

    // ── Slide 1: Cover ─────────────────────────────────────
    drawSfxBorder(pdf, W, H);
    pdf.setFontSize(28); pdf.setFont(undefined,'bold');
    pdf.setTextColor(42,157,143);
    pdf.text('SHADOWFAX', W/2 - 80, H/2 - 20);
    pdf.setFontSize(11); pdf.setFont(undefined,'italic');
    pdf.text('Think ahead!', W/2 - 30, H/2 + 5);
    pdf.setFontSize(14); pdf.setFont(undefined,'bold'); pdf.setTextColor(30,37,53);
    pdf.text('Client Wise Summary Dashboard', W/2 - 130, H/2 + 45);
    pdf.setFontSize(10); pdf.setFont(undefined,'normal'); pdf.setTextColor(100,100,100);
    pdf.text(data.dateStr + '  ·  Bucket: ' + data.bucket + '  ·  ' + data.clients.length + ' clients',
      W/2 - 100, H/2 + 62);
    pdf.setFontSize(8); pdf.setTextColor(150,150,150);
    pdf.text('www.shadowfax.in', M, H - 24);

    // ── Capture each dashboard tab as-is ───────────────────
    const tabs = [
      {id:'ov',    i:0, title:'Overview'},
      {id:'esc',   i:1, title:'Escalation % Analysis'},
      {id:'la',    i:2, title:'Loss Accepted % Analysis'},
      {id:'aov',   i:3, title:'AOV & CPO Analysis'},
      {id:'trend', i:4, title:'Trend View (Weekly / Monthly / Quarterly)'}
    ];
    const tbBtns = document.querySelectorAll('.tab');
    const origTab = TAB;
    for (let t=0; t<tabs.length; t++) {
      const info = tabs[t];
      sw(info.id, tbBtns[info.i]);
      await new Promise(r => setTimeout(r, 900));
      const el = document.getElementById('s-'+info.id);
      const boxes = el.querySelectorAll('.tw');
      const saved = []; boxes.forEach(b=>{saved.push(b.style.cssText); b.style.maxHeight='none'; b.style.overflowY='visible';});
      await new Promise(r => setTimeout(r,100));
      const cv = await html2canvas(el,{scale:1.6, backgroundColor:'#fff', useCORS:true, logging:false, windowWidth:1400});
      boxes.forEach((b,i)=>{b.style.cssText=saved[i];});
      const iW = W - M*2;
      const iH = cv.height * iW / cv.width;
      const contentH = H - 78 - M;
      pdf.addPage();
      drawSfxHeader(pdf, W, info.title, data.dateStr);
      drawSfxBorder(pdf, W, H);
      let yo = 0;
      while (yo < iH) {
        if (yo > 0) { pdf.addPage(); drawSfxHeader(pdf, W, info.title+' (cont.)', data.dateStr); drawSfxBorder(pdf, W, H); }
        const sh = Math.min(contentH, iH - yo);
        const sy = yo * (cv.height / iH);
        const sH = sh * (cv.height / iH);
        const slc = document.createElement('canvas'); slc.width = cv.width; slc.height = Math.ceil(sH);
        slc.getContext('2d').drawImage(cv, 0, sy, cv.width, sH, 0, 0, cv.width, sH);
        pdf.addImage(slc.toDataURL('image/png'), 'PNG', M, 65, iW, sh);
        yo += sh;
      }
    }
    sw(origTab, tbBtns[tabs.findIndex(x=>x.id===origTab) || 0]);

    // ── Final: Thank you ───────────────────────────────────
    pdf.addPage();
    drawSfxBorder(pdf, W, H);
    pdf.setFontSize(42); pdf.setFont(undefined,'bold'); pdf.setTextColor(30,37,53);
    pdf.text('Thank You', W/2 - 90, H/2);
    pdf.setFontSize(9); pdf.setTextColor(150,150,150);
    pdf.text('www.shadowfax.in', M, H - 24);

    pdf.save('ClientWise_Dashboard_' + data.dateStr.replace(/[, ]/g,'_') + '.pdf');
  } catch (e) {
    console.error('[PDF]', e);
    alert('PDF failed: ' + e.message);
  } finally {
    btn.innerHTML = orig; btn.disabled = false;
  }
}

function drawSfxHeader(pdf, W, title, dateStr) {
  // Green header strip
  pdf.setFillColor(42,157,143);
  pdf.rect(0, 0, W, 40, 'F');
  // Yellow accent line
  pdf.setFillColor(244,208,63);
  pdf.rect(0, 40, W, 3, 'F');
  // Title
  pdf.setTextColor(255,255,255);
  pdf.setFontSize(15); pdf.setFont(undefined,'bold');
  pdf.text(title, W/2 - (title.length * 4), 26);
  // Date on right
  pdf.setFontSize(8); pdf.setFont(undefined,'normal');
  pdf.text(dateStr, W - 100, 26);
}
function drawSfxBorder(pdf, W, H) {
  // Bottom footer strip
  pdf.setFillColor(42,157,143);
  pdf.rect(0, H - 18, W, 18, 'F');
  pdf.setTextColor(255,255,255);
  pdf.setFontSize(7);
  pdf.text('www.shadowfax.in', 32, H - 6);
}

    ];

    // Quarter builder
    function buildQuarters(cls) {
      const mm={jan:1,feb:1,mar:1,apr:2,may:2,jun:2,jul:3,aug:3,sep:3,oct:4,nov:4,dec:4};
      const qm={};
      DB.mom.months.forEach(mo=>{
        const m3=mo.mo.slice(0,3).toLowerCase();
        const yr=mo.mo.includes("'")?'20'+mo.mo.split("'")[1]:''+new Date().getFullYear();
        const ql='Q'+(mm[m3]||1)+' '+yr;
        if(!qm[ql])qm[ql]={lbl:ql,del:0,esc:0,loss:0,lv:0};
        qm[ql].del+=cls.reduce((s,c)=>s+(mo.clients[c]?.del||0),0);
        qm[ql].esc+=cls.reduce((s,c)=>s+(mo.clients[c]?.esc||0),0);
        qm[ql].loss+=cls.reduce((s,c)=>s+(mo.clients[c]?.loss||0),0);
        qm[ql].lv+=cls.reduce((s,c)=>s+(mo.clients[c]?.lv||0),0);
      });
      const qo=['Q1','Q2','Q3','Q4'];
      return Object.values(qm).sort((a,b)=>{
        const[qa,ya]=[a.lbl.split(' ')[0],a.lbl.split(' ')[1]];
        const[qb,yb]=[b.lbl.split(' ')[0],b.lbl.split(' ')[1]];
        return ya!==yb?ya.localeCompare(yb):qo.indexOf(qa)-qo.indexOf(qb);
      }).map(x=>({...x,
        escP:x.del>0?x.esc/x.del*100:0,laP:x.esc>0?x.loss/x.esc*100:0,
        cpo:x.del>0?x.lv/x.del:0,aov:x.loss>0?x.lv/x.loss:0}));
    }

    // Pre-compute bucket aggregates
    buckets.forEach(b=>{
      b.w8  = weekAgg(last8w, b.clients);
      b.m2  = monthAggForClients(last2m, b.clients);
      b.mAll= monthAggForClients(janToCur, b.clients);
      b.qtr = buildQuarters(b.clients);
      b.wAll= weekAgg(allWeeks, b.clients);
    });

    // Row formatter
    const fR = d => [
      Math.round(d.del).toLocaleString('en-IN'),
      Math.round(d.esc).toLocaleString('en-IN'),
      d.escP.toFixed(2)+'%',
      Math.round(d.loss).toLocaleString('en-IN'),
      d.laP.toFixed(2)+'%',
      '₹'+Math.round(d.lv).toLocaleString('en-IN'),
      '₹'+d.aov.toFixed(2),
      '₹'+d.cpo.toFixed(2)
    ];
    const tH = ['Period','Del','Esc','Esc%','Loss','LA%','LossVal','AOV','CPO'];

    // Client-level agg for a given week list
    function clientAggW(cls, wks) {
      const out={};
      cls.forEach(c=>{
        let del=0,esc=0,loss=0,lv=0;
        wks.forEach(wk=>{const d=(DB.wow.week_client[wk]||{})[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
        out[c]={del,esc,loss,lv,escP:del>0?esc/del*100:0,laP:esc>0?loss/esc*100:0,cpo:del>0?lv/del:0,aov:loss>0?lv/loss:0};
      });
      return out;
    }

    // ═══════ SLIDE 1: COVER ═══════════════════════════════════
    {
      const s=pptx.addSlide(); s.background={color:'FFFFFF'};
      s.addShape(pptx.ShapeType.rect,{x:0,y:0,w:0.15,h:7.5,fill:{color:SFX.primary}});
      s.addText('SHADOWFAX',{x:1.5,y:2.2,w:10,h:0.8,fontFace:'Calibri',fontSize:44,bold:true,color:SFX.primary,align:'center'});
      s.addText('Think ahead!',{x:1.5,y:3.0,w:10,h:0.5,fontFace:'Calibri',fontSize:20,italic:true,color:SFX.primary,align:'center'});
      s.addText('Client Wise Summary Dashboard',{x:1.5,y:3.9,w:10,h:0.5,fontFace:'Calibri',fontSize:24,bold:true,color:SFX.darkTx,align:'center'});
      s.addText('Meesho & FTPL Excluded',{x:1.5,y:4.4,w:10,h:0.35,fontFace:'Calibri',fontSize:13,color:'DC2626',align:'center'});
      const ctx = [
        'Last 8 Weeks: '+last8w[0].replace('2026-','')+' → '+last8w[last8w.length-1].replace('2026-',''),
        'Last 2 Months: '+last2m.join(', '),
        "Jan'26 → "+curMo+' ('+janToCur.length+' months)',
        'Quarterly: '+buckets[0].qtr.map(q=>q.lbl).join(', '),
        allClients.length+' clients  ·  '+data.dateStr
      ];
      s.addText(ctx.join('\n'),{x:2,y:5.0,w:9.3,h:1.5,fontFace:'Calibri',fontSize:12,color:'666666',align:'center',lineSpacingMultiple:1.6});
      s.addText('www.shadowfax.in',{x:0.4,y:7.15,w:3,h:0.3,fontFace:'Calibri',fontSize:9,color:'888888'});
    }

    // ═══════ SLIDE 2: EXECUTIVE SUMMARY — Bucket Comparison ═══
    {
      const s=pptx.addSlide();
      addSlideHeader(s,pptx,'Executive Summary — Bucket Comparison (All Data)',data.dateStr);
      const bH=['Metric',...buckets.map(b=>b.label)];
      const tot=b=>{const t=b.wAll.reduce((a,d)=>({del:a.del+d.del,esc:a.esc+d.esc,loss:a.loss+d.loss,lv:a.lv+d.lv}),{del:0,esc:0,loss:0,lv:0});return t;};
      const ts=buckets.map(b=>tot(b));
      const bR=[
        ['Total Del',...ts.map(t=>Math.round(t.del).toLocaleString('en-IN'))],
        ['Total Esc',...ts.map(t=>Math.round(t.esc).toLocaleString('en-IN'))],
        ['Esc %',...ts.map(t=>(t.del>0?(t.esc/t.del*100).toFixed(2):'0')+'%')],
        ['LA %',...ts.map(t=>(t.esc>0?(t.loss/t.esc*100).toFixed(2):'0')+'%')],
        ['Loss Value',...ts.map(t=>'₹'+Math.round(t.lv).toLocaleString('en-IN'))],
        ['CPO',...ts.map(t=>'₹'+(t.del>0?(t.lv/t.del).toFixed(2):'0'))],
        ['AOV',...ts.map(t=>'₹'+(t.loss>0?(t.lv/t.loss).toFixed(2):'0'))],
        ['Clients',...buckets.map(b=>String(b.clients.length))]
      ];
      addSfxTable(s,bH,bR,{x:0.4,y:0.9,w:12.5,fontSize:12,rowH:0.42});
    }

    // ═══════ SECTION A: LAST 8 WEEKS ═════════════════════════
    // Overview charts: Del + Esc% + CPO + LA% (bucket-wise, last 8 weeks)
    {
      const s=pptx.addSlide();
      addSlideHeader(s,pptx,'Last 8 Weeks — Bucket-wise Trends ('+last8w[0].replace('2026-','')+' → '+last8w[last8w.length-1].replace('2026-','')+')',data.dateStr);
      const lbs=last8w.map(w=>w.replace('2026-',''));
      const mkLine=(metric,title,x,y)=>{
        const cd=buckets.map(b=>({name:b.label,labels:lbs,
          values:b.w8.map(d=>metric==='del'?d.del:metric==='escP'?Number(d.escP.toFixed(2)):metric==='laP'?Number(d.laP.toFixed(2)):Number(d.cpo.toFixed(2)))}));
        s.addChart(pptx.ChartType.line,cd,{
          x,y,w:6.2,h:3.0,showLegend:true,legendPos:'b',legendFontSize:9,
          showTitle:true,title,titleFontSize:11,titleColor:SFX.darkTx,
          lineDataSymbol:'circle',lineDataSymbolSize:5,chartColors:buckets.map(b=>b.color),
          catAxisLabelFontSize:8,valAxisLabelFontSize:8});
      };
      mkLine('del','Deliveries — Last 8 Weeks',0.4,0.85);
      mkLine('escP','Esc % — Last 8 Weeks',6.8,0.85);
      mkLine('cpo','CPO (₹) — Last 8 Weeks',0.4,4.1);
      mkLine('laP','LA % — Last 8 Weeks',6.8,4.1);
    }
    // Weekly table per bucket (last 8 weeks, paginated)
    buckets.forEach(bkt=>{
      addTimeBasedSection(pptx,{
        title:'Last 8 Weeks — '+bkt.label,dateStr:data.dateStr,chartType:'combo',
        cats:bkt.w8.map(d=>d.wk.replace('2026-','')),
        chartData:[
          {name:'Deliveries',labels:bkt.w8.map(d=>d.wk.replace('2026-','')),values:bkt.w8.map(d=>d.del)},
          {name:'Esc%',labels:bkt.w8.map(d=>d.wk.replace('2026-','')),values:bkt.w8.map(d=>Number(d.escP.toFixed(2)))}
        ],color:bkt.color,tableHdr:tH,
        tableRows:bkt.w8.map(d=>[d.wk.replace('2026-',''),...fR(d)]),rowsPerSlide:12
      });
    });

    // ═══════ SECTION B: LAST 2 MONTHS COMPARISON ═════════════
    {
      const s=pptx.addSlide();
      addSlideHeader(s,pptx,'Last 2 Months Comparison — '+last2m.join(' vs '),data.dateStr);
      const hdr=['Metric',...buckets.map(b=>b.label+' '+last2m[0]),...buckets.map(b=>b.label+' '+last2m[1]),'Overall Δ'];
      const m0=buckets.map(b=>b.m2[0]||{del:0,esc:0,loss:0,lv:0,escP:0,laP:0,cpo:0,aov:0});
      const m1=buckets.map(b=>b.m2[1]||{del:0,esc:0,loss:0,lv:0,escP:0,laP:0,cpo:0,aov:0});
      const ovD0=m0[0], ovD1=m1[0]; // overall bucket is index 0
      const rows=[
        ['Del Count',...m0.map(d=>Math.round(d.del).toLocaleString('en-IN')),...m1.map(d=>Math.round(d.del).toLocaleString('en-IN')),
          (ovD1.del-ovD0.del>=0?'+':'')+Math.round(ovD1.del-ovD0.del).toLocaleString('en-IN')],
        ['Esc %',...m0.map(d=>d.escP.toFixed(2)+'%'),...m1.map(d=>d.escP.toFixed(2)+'%'),
          (ovD1.escP-ovD0.escP>=0?'+':'')+(ovD1.escP-ovD0.escP).toFixed(2)+'%'],
        ['LA %',...m0.map(d=>d.laP.toFixed(2)+'%'),...m1.map(d=>d.laP.toFixed(2)+'%'),
          (ovD1.laP-ovD0.laP>=0?'+':'')+(ovD1.laP-ovD0.laP).toFixed(2)+'%'],
        ['CPO (₹)',...m0.map(d=>'₹'+d.cpo.toFixed(2)),...m1.map(d=>'₹'+d.cpo.toFixed(2)),
          (ovD1.cpo-ovD0.cpo>=0?'+':'')+'₹'+(ovD1.cpo-ovD0.cpo).toFixed(2)],
        ['AOV (₹)',...m0.map(d=>'₹'+d.aov.toFixed(2)),...m1.map(d=>'₹'+d.aov.toFixed(2)),
          (ovD1.aov-ovD0.aov>=0?'+':'')+'₹'+(ovD1.aov-ovD0.aov).toFixed(2)],
        ['Loss Value',...m0.map(d=>'₹'+Math.round(d.lv).toLocaleString('en-IN')),...m1.map(d=>'₹'+Math.round(d.lv).toLocaleString('en-IN')),
          (ovD1.lv-ovD0.lv>=0?'+':'')+' ₹'+Math.round(Math.abs(ovD1.lv-ovD0.lv)).toLocaleString('en-IN')]
      ];
      addSfxTable(s,hdr,rows,{x:0.3,y:0.9,w:12.7,fontSize:9,rowH:0.45});
    }

    // ═══════ SECTION C: JAN → CURRENT MONTH (MoM) ════════════
    // Monthly trend charts (Jan→current)
    {
      const s=pptx.addSlide();
      addSlideHeader(s,pptx,"Jan'26 → "+curMo+' — Monthly Trends (Bucket-wise)',data.dateStr);
      const lbs=janToCur;
      const mkLine=(metric,title,x,y)=>{
        const cd=buckets.map(b=>({name:b.label,labels:lbs,
          values:b.mAll.map(d=>metric==='del'?d.del:metric==='escP'?Number(d.escP.toFixed(2)):metric==='laP'?Number(d.laP.toFixed(2)):Number(d.cpo.toFixed(2)))}));
        s.addChart(pptx.ChartType.line,cd,{
          x,y,w:6.2,h:3.0,showLegend:true,legendPos:'b',legendFontSize:9,
          showTitle:true,title,titleFontSize:11,titleColor:SFX.darkTx,
          lineDataSymbol:'circle',lineDataSymbolSize:5,chartColors:buckets.map(b=>b.color),
          catAxisLabelFontSize:8,valAxisLabelFontSize:8});
      };
      mkLine('del','Deliveries (MoM)',0.4,0.85);
      mkLine('escP','Esc % (MoM)',6.8,0.85);
      mkLine('cpo','CPO ₹ (MoM)',0.4,4.1);
      mkLine('laP','LA % (MoM)',6.8,4.1);
    }
    // Monthly table per bucket
    buckets.forEach(bkt=>{
      addTimeBasedSection(pptx,{
        title:"Jan→"+curMo+' Monthly — '+bkt.label,dateStr:data.dateStr,chartType:'combo',
        cats:bkt.mAll.map(d=>d.mo),
        chartData:[
          {name:'Deliveries',labels:bkt.mAll.map(d=>d.mo),values:bkt.mAll.map(d=>d.del)},
          {name:'Esc%',labels:bkt.mAll.map(d=>d.mo),values:bkt.mAll.map(d=>Number(d.escP.toFixed(2)))}
        ],color:bkt.color,tableHdr:tH,
        tableRows:bkt.mAll.map(d=>[d.mo,...fR(d)]),rowsPerSlide:12
      });
    });

    // ═══════ SECTION D: QUARTERLY COMPARISON ═════════════════
    {
      const s=pptx.addSlide();
      addSlideHeader(s,pptx,'Quarterly Comparison — Bucket-wise',data.dateStr);
      const qLbs=buckets[0].qtr.map(q=>q.lbl);
      const mkBar=(metric,title,x,y)=>{
        const cd=buckets.map(b=>({name:b.label,labels:qLbs,
          values:b.qtr.map(d=>metric==='del'?d.del:metric==='escP'?Number(d.escP.toFixed(2)):metric==='laP'?Number(d.laP.toFixed(2)):Number(d.cpo.toFixed(2)))}));
        s.addChart(pptx.ChartType.bar,cd,{
          x,y,w:6.2,h:3.0,barDir:'col',barGrouping:'clustered',
          showLegend:true,legendPos:'b',legendFontSize:9,
          showTitle:true,title,titleFontSize:11,titleColor:SFX.darkTx,
          chartColors:buckets.map(b=>b.color),catAxisLabelFontSize:9,valAxisLabelFontSize:9});
      };
      mkBar('del','Deliveries (QoQ)',0.4,0.85);
      mkBar('escP','Esc % (QoQ)',6.8,0.85);
      mkBar('cpo','CPO ₹ (QoQ)',0.4,4.1);
      mkBar('laP','LA % (QoQ)',6.8,4.1);
    }
    // Quarterly table per bucket
    buckets.forEach(bkt=>{
      if(!bkt.qtr.length) return;
      addTimeBasedSection(pptx,{
        title:'Quarterly — '+bkt.label,dateStr:data.dateStr,chartType:'bar',
        cats:bkt.qtr.map(d=>d.lbl),
        chartData:[
          {name:'Deliveries',labels:bkt.qtr.map(d=>d.lbl),values:bkt.qtr.map(d=>d.del)},
          {name:'Esc%',labels:bkt.qtr.map(d=>d.lbl),values:bkt.qtr.map(d=>Number(d.escP.toFixed(2)))}
        ],color:bkt.color,tableHdr:tH,
        tableRows:bkt.qtr.map(d=>[d.lbl,...fR(d)]),rowsPerSlide:12
      });
    });

    // ═══════ SECTION E: TOP 25 NON-MEESHO NON-AJIO CLIENTS ═══
    // Client agg for Non-Meesho Non-AJIO
    const nmnaCA = clientAggW(nonAjioList, allWeeks);
    const nmnaAll = Object.entries(nmnaCA).filter(([,d])=>d.del>0);

    // Sort by multiple metrics → separate tables
    const sortings = [
      { title:'Top 25 Non-Meesho Non-AJIO — by Esc %',   sortFn:(a,b)=>b[1].escP-a[1].escP },
      { title:'Top 25 Non-Meesho Non-AJIO — by CPO (₹)', sortFn:(a,b)=>b[1].cpo-a[1].cpo },
      { title:'Top 25 Non-Meesho Non-AJIO — by Deliveries', sortFn:(a,b)=>b[1].del-a[1].del },
      { title:'Top 25 Non-Meesho Non-AJIO — by LA %',    sortFn:(a,b)=>b[1].laP-a[1].laP },
      { title:'Top 25 Non-Meesho Non-AJIO — by Loss Value', sortFn:(a,b)=>b[1].lv-a[1].lv },
      { title:'Top 25 Non-Meesho Non-AJIO — by AOV (₹)', sortFn:(a,b)=>b[1].aov-a[1].aov }
    ];
    const cHdr = ['#','Client','Del','Esc','Esc%','Loss','LA%','Loss Value','AOV','CPO'];

    sortings.forEach(({ title, sortFn }) => {
      const sorted = [...nmnaAll].sort(sortFn).slice(0,25);
      // Slide with bar chart on top + table below
      const s = pptx.addSlide();
      addSlideHeader(s, pptx, title, data.dateStr);
      // Bar chart: show the ranking metric for top 10
      const top10 = sorted.slice(0,10);
      const metricKey = title.includes('Esc %') ? 'escP' : title.includes('CPO') ? 'cpo'
        : title.includes('Deliveries') ? 'del' : title.includes('LA %') ? 'laP'
        : title.includes('Loss Value') ? 'lv' : 'aov';
      const chartVals = top10.map(([,d]) => {
        if(metricKey==='del') return d.del;
        if(metricKey==='lv') return d.lv;
        return Number(d[metricKey].toFixed(2));
      });
      const barColor = metricKey==='escP'?'EF4444':metricKey==='cpo'?'8B5CF6':metricKey==='laP'?'10B981':metricKey==='lv'?'F59E0B':'3B82F6';
      s.addChart(pptx.ChartType.bar,[{name:title.split('by ')[1]||'',labels:top10.map(([c])=>c.slice(0,18)),values:chartVals}],{
        x:0.4,y:0.85,w:12.5,h:2.6,barDir:'bar',showLegend:false,
        chartColors:[barColor],catAxisLabelFontSize:9,valAxisLabelFontSize:9,
        showTitle:false});
      // Table: all 25 rows below chart
      const rows = sorted.map(([c,d],i) => [
        String(i+1), c,
        Math.round(d.del).toLocaleString('en-IN'),
        Math.round(d.esc).toLocaleString('en-IN'),
        d.escP.toFixed(2)+'%',
        Math.round(d.loss).toLocaleString('en-IN'),
        d.laP.toFixed(2)+'%',
        '₹'+Math.round(d.lv).toLocaleString('en-IN'),
        d.aov>0?'₹'+d.aov.toFixed(2):'—',
        d.cpo>0?'₹'+d.cpo.toFixed(2):'—'
      ]);
      // Split table across slides if needed
      const perPage = 13; // first page has chart so fewer rows
      for (let p=0; p<Math.ceil(rows.length/perPage); p++) {
        if (p > 0) {
          const sc = pptx.addSlide();
          addSlideHeader(sc, pptx, title + ' (cont.)', data.dateStr);
          addSfxTable(sc, cHdr, rows.slice(p*perPage, (p+1)*perPage), {x:0.3,y:0.85,w:12.7,fontSize:9,rowH:0.26});
        } else {
          addSfxTable(s, cHdr, rows.slice(0, perPage), {x:0.3,y:3.7,w:12.7,fontSize:9,rowH:0.26});
        }
      }
    });

    // ═══════ INSIGHTS — All Buckets + Non-Meesho Client-wise ══
    {
      const s=pptx.addSlide();
      addSlideHeader(s,pptx,'Key Insights — Bucket & Client-wise',data.dateStr);
      const bl=[];
      buckets.forEach(b=>{
        const lm=b.mAll[b.mAll.length-1], pm=b.mAll[b.mAll.length-2];
        if(!lm)return;
        bl.push({text:b.label.toUpperCase(),options:{fontSize:13,bold:true,color:b.color,paraSpaceAfter:3,breakLine:true}});
        if(pm){
          const eU=lm.escP>pm.escP;
          bl.push({text:`Esc% ${eU?'↑ increased':'↓ decreased'} to ${lm.escP.toFixed(2)}% from ${pm.escP.toFixed(2)}% in ${pm.mo} (Δ ${(lm.escP-pm.escP).toFixed(2)}%)`,
            options:{bullet:{code:'25CF'},fontSize:10,color:eU?'DC2626':'16A34A',paraSpaceAfter:2,breakLine:true}});
          bl.push({text:`LA% ${lm.laP>pm.laP?'↑':'↓'} ${lm.laP.toFixed(2)}% · CPO ₹${lm.cpo.toFixed(2)} · AOV ₹${lm.aov.toFixed(2)} · Loss ₹${Math.round(lm.lv).toLocaleString('en-IN')}`,
            options:{bullet:{code:'25CF'},fontSize:10,color:SFX.darkTx,paraSpaceAfter:2,breakLine:true}});
        }
        const bca=clientAggW(b.clients,allWeeks);
        const topV=Object.entries(bca).sort((a,b2)=>b2[1].del-a[1].del)[0];
        const hEsc=Object.entries(bca).filter(([,d])=>d.del>0).sort((a,b2)=>b2[1].escP-a[1].escP)[0];
        const hCpo=Object.entries(bca).filter(([,d])=>d.del>0).sort((a,b2)=>b2[1].cpo-a[1].cpo)[0];
        if(topV) bl.push({text:`Top volume: ${topV[0]} — ${Math.round(topV[1].del).toLocaleString('en-IN')} del · Esc ${topV[1].escP.toFixed(2)}%`,
          options:{bullet:{code:'25CF'},fontSize:10,color:SFX.darkTx,paraSpaceAfter:2,breakLine:true}});
        if(hEsc&&hEsc[0]!==topV?.[0]) bl.push({text:`Highest Esc%: ${hEsc[0]} at ${hEsc[1].escP.toFixed(2)}%`,
          options:{bullet:{code:'25CF'},fontSize:10,color:'DC2626',paraSpaceAfter:2,breakLine:true}});
        if(hCpo&&hCpo[0]!==hEsc?.[0]&&hCpo[0]!==topV?.[0]) bl.push({text:`Highest CPO: ${hCpo[0]} at ₹${hCpo[1].cpo.toFixed(2)}`,
          options:{bullet:{code:'25CF'},fontSize:10,color:'7C3AED',paraSpaceAfter:2,breakLine:true}});
        bl.push({text:'',options:{fontSize:3,paraSpaceAfter:5,breakLine:true}});
      });
      s.addText(bl,{x:0.5,y:0.85,w:12.3,h:6.3,fontFace:'Calibri',valign:'top'});
    }

    // ═══════ THANK YOU ════════════════════════════════════════
    {
      const s=pptx.addSlide(); s.background={color:'FFFFFF'};
      s.addShape(pptx.ShapeType.rect,{x:0,y:0,w:0.15,h:7.5,fill:{color:SFX.primary}});
      s.addText('Thank You',{x:1.5,y:3.0,w:10,h:1.2,fontFace:'Calibri',fontSize:60,bold:true,color:SFX.darkTx,align:'center'});
      s.addText('www.shadowfax.in',{x:0.4,y:7.15,w:3,h:0.3,fontFace:'Calibri',fontSize:9,color:'888888'});
    }

    await pptx.writeFile({fileName:'ClientWise_Dashboard_'+data.dateStr.replace(/[, ]/g,'_')+'.pptx'});
  } catch(e){ console.error('[PPT]',e); alert('PPT failed: '+e.message); }
  finally { btn.innerHTML=orig; btn.disabled=false; }
}

// Paginate a table across slides (no chart on top, just full-page table)
function paginateTable(pptx,title,dateStr,hdr,rows,perPage) {
  const pages=Math.max(1,Math.ceil(rows.length/perPage));
  for(let p=0;p<pages;p++){
    const s=pptx.addSlide();
    const suf=pages>1?' (Part '+(p+1)+'/'+pages+')':'';
    addSlideHeader(s,pptx,title+suf,dateStr);
    addSfxTable(s,hdr,rows.slice(p*perPage,(p+1)*perPage),{x:0.3,y:0.85,w:12.7,fontSize:10,rowH:0.27});
  }
}

// Chart + paginated table (chart on first slide top half, table on bottom/continuation)
function addTimeBasedSection(pptx,opts) {
  const {title,dateStr,chartType,cats,chartData,color,tableHdr,tableRows,rowsPerSlide}=opts;
  const pages=Math.max(1,Math.ceil(tableRows.length/rowsPerSlide));
  for(let p=0;p<pages;p++){
    const s=pptx.addSlide();
    addSlideHeader(s,pptx,title+(pages>1?' (Part '+(p+1)+'/'+pages+')':''),dateStr);
    if(p===0){
      if(chartType==='combo'){
        s.addChart(pptx.ChartType.bar,[chartData[0]],{
          x:0.4,y:0.85,w:12.5,h:2.9,barDir:'col',showLegend:true,legendPos:'b',legendFontSize:10,
          chartColors:[color],catAxisLabelFontSize:9,
          showTitle:true,title:chartData[0].name+' & '+chartData[1].name,titleFontSize:12,titleColor:SFX.darkTx});
      } else if(chartType==='bar'){
        s.addChart(pptx.ChartType.bar,chartData,{
          x:0.4,y:0.85,w:12.5,h:2.9,barDir:'col',barGrouping:'clustered',
          showLegend:true,legendPos:'b',legendFontSize:10,
          chartColors:[color,'EF4444'],catAxisLabelFontSize:9});
      } else {
        s.addChart(pptx.ChartType.line,chartData,{
          x:0.4,y:0.85,w:12.5,h:2.9,showLegend:true,legendPos:'b',legendFontSize:10,
          chartColors:[color,'EF4444'],lineDataSymbol:'circle',lineDataSymbolSize:6,catAxisLabelFontSize:9});
      }
    }
    const pr=tableRows.slice(p*rowsPerSlide,(p+1)*rowsPerSlide);
    addSfxTable(s,tableHdr,pr,{x:0.4,y:p===0?4.0:0.85,w:12.5,fontSize:10,rowH:p===0?0.24:0.28});
  }
}

// PPT helper: Shadowfax-style header
function addSlideHeader(s,pptx,title,dateStr) {
  s.background={color:'FFFFFF'};
  s.addShape(pptx.ShapeType.rect,{x:0,y:0,w:13.33,h:0.55,fill:{color:SFX.primary}});
  s.addShape(pptx.ShapeType.rect,{x:0,y:0.55,w:13.33,h:0.06,fill:{color:SFX.accent}});
  s.addText(title,{x:0.4,y:0.05,w:10.5,h:0.5,fontFace:'Calibri',fontSize:20,bold:true,italic:true,color:'FFFFFF'});
  s.addText(dateStr,{x:10.9,y:0.13,w:2.2,h:0.35,fontFace:'Calibri',fontSize:10,color:'FFFFFF',align:'right'});
  s.addShape(pptx.ShapeType.rect,{x:0,y:7.25,w:13.33,h:0.25,fill:{color:SFX.primary}});
  s.addText('www.shadowfax.in',{x:0.4,y:7.28,w:3,h:0.2,fontFace:'Calibri',fontSize:9,color:'FFFFFF'});
}

// PPT helper: Shadowfax-styled table
function addSfxTable(s,headers,rows,opts) {
  const fs=opts.fontSize||11,rh=opts.rowH||0.32,table=[];
  table.push(headers.map(h=>({text:h,options:{bold:true,fontSize:fs+1,color:'FFFFFF',fill:{color:SFX.primary},
    align:'center',valign:'middle',fontFace:'Calibri'}})));
  rows.forEach((row,ri)=>{
    table.push(row.map((cell,ci)=>({text:String(cell),options:{
      fontSize:fs,color:SFX.darkTx,fill:{color:ri%2===0?'FFFFFF':SFX.tableAlt},
      align:ci===0?'left':'center',valign:'middle',fontFace:'Calibri',bold:ci===0}})));
  });
  s.addTable(table,{x:opts.x,y:opts.y,w:opts.w,border:{pt:0.5,color:'CCCCCC'},rowH:rh});
}

function inBkt(c) {
  const aj = new Set(DB.meta.ajio);
  if (BKT==='all') return true;
  if (BKT==='ajio') return aj.has(c);
  if (BKT==='nonajio') return !aj.has(c);
  return true;
}

function toggleMsel(key) {
  const p = document.getElementById(key+'Panel');
  const wasOpen = p.classList.contains('open');
  document.querySelectorAll('.msel-panel').forEach(x=>x.classList.remove('open'));

// ── MONTHS ────────────────────────────────────────────────────
// ── MONTHS ────────────────────────────────────────────────────
// PENDING_MONTHS = draft selection (updated on checkbox click, NOT applied yet)
// SEL_MONTHS     = committed selection (applied to charts/tables)
// Both empty = "All Months"

function renderMonthList() {
  const box = document.getElementById('mofList'); if (!DB) return;
  const allSelected = PENDING_MONTHS.length === 0;
  box.innerHTML = [...DB.meta.months].reverse().map(m => {
    const chk = allSelected || PENDING_MONTHS.includes(m);
    return `<label class="msel-item ${chk?'checked':''}">
      <input type="checkbox" ${chk?'checked':''} onchange="draftMonth('${m}')">
      ${m}
    </label>`;
  }).join('');
  updateMonthCount();
}

function draftMonth(m) {
  // Update draft only — do NOT call go() yet
  if (PENDING_MONTHS.length === 0) {
    // Currently "All" — deselect means pick all EXCEPT this one
    PENDING_MONTHS = DB.meta.months.filter(x => x !== m);
  } else {
    const i = PENDING_MONTHS.indexOf(m);
    if (i === -1) PENDING_MONTHS.push(m); else PENDING_MONTHS.splice(i, 1);
    // If all months re-selected, collapse back to empty = "All"
    if (PENDING_MONTHS.length === DB.meta.months.length) PENDING_MONTHS = [];
  }
  renderMonthList();  // re-render checkboxes with new draft state
}

function applyMonths() {
  // Commit draft → active selection, then re-render dashboard
  SEL_MONTHS = [...PENDING_MONTHS];
  MONTH_MODE = SEL_MONTHS.length === 0 ? 'all' : 'custom';
  updateMonthBtnLabel();
  document.querySelectorAll('.msel-panel').forEach(p => p.classList.remove('open'));
  go();
}

function quickMonths(n) {
  if (!DB) return;
  MONTH_MODE = n === 0 ? 'all' : 'last' + n;
  PENDING_MONTHS = n === 0 ? [] : DB.meta.months.slice(-n);
  SEL_MONTHS = [...PENDING_MONTHS];  // quick buttons apply immediately
  updateMonthBtnLabel();
  renderMonthList();
  document.querySelectorAll('.msel-panel').forEach(p => p.classList.remove('open'));
  go();
}

function updateMonthCount() {
  const el = document.getElementById('mofCount');
  if (!el) return;
  if (PENDING_MONTHS.length === 0) {
    el.textContent = 'All ' + (DB?.meta.months.length||0) + ' months selected';
  } else {
    el.textContent = PENDING_MONTHS.length + ' of ' + (DB?.meta.months.length||0) + ' selected';
  }
}

function updateMonthBtnLabel() {
  const btn = document.querySelector('#mofWrap .msel-btn');
  if (!btn) return;
  let txt;
  if (SEL_MONTHS.length === 0 || MONTH_MODE === 'all') {
    txt = 'All Months';
  } else if (MONTH_MODE === 'last3') {
    txt = 'Last 3 Months';
  } else if (MONTH_MODE === 'last6') {
    txt = 'Last 6 Months';
  } else {
    txt = SEL_MONTHS.length === 1 ? SEL_MONTHS[0] : SEL_MONTHS.length + ' months';
  }
  btn.innerHTML = txt + ' <span class="msel-arr">▾</span>';
}

function getMonths() {
  if (!DB) return [];
  return SEL_MONTHS.length > 0 ? SEL_MONTHS : [...DB.meta.months];
}

    el.textContent = 'All ' + total + ' clients';

  let txt;

  else if (SEL_CLIENTS.length === 1) txt = SEL_CLIENTS[0].slice(0,20);
  else txt = SEL_CLIENTS.length + ' clients';

function setMinDel(v) {
  MIN_DEL = parseInt(v)||0;
  document.querySelector('#mndWrap .msel-btn').innerHTML =
    (MIN_DEL===0?'No Min':'≥ '+MIN_DEL.toLocaleString('en-IN'))+' <span class="msel-arr">▾</span>';
  document.querySelectorAll('.msel-panel').forEach(x=>x.classList.remove('open'));
  go();
}
function filteredClients() {
  if (!DB) return [];
  const sq = document.getElementById('srch').value.toLowerCase();
  return DB.meta.clients.filter(c => {
    if (!inBkt(c)) return false;
    if (SEL_CLIENTS.length && !SEL_CLIENTS.includes(c)) return false;
    if (sq && !c.toLowerCase().includes(sq)) return false;
    if (MIN_DEL > 0) {
      // Use overall summary for quick check; period-specific del for month mode
      if (PERIOD === 'month') {
        const months = getMonths();
        const periodDel = months.reduce((s, mo) => {
          const m = DB.mom.months.find(x => x.mo === mo);
          return s + (m?.clients[c]?.del || 0);
        }, 0);
        if (periodDel < MIN_DEL) return false;
      } else {
        const s = DB.summary.clients[c];
        if (!s || s.del < MIN_DEL) return false;
      }
    }
    return true;
  });
}

// ── AGGREGATION ───────────────────────────────────────────────
function weekAgg(weeks, clients) {
  return weeks.map(wk => {
    const wc = DB.wow.week_client[wk]||{};
    let del=0,esc=0,loss=0,lv=0;
    clients.forEach(c=>{const d=wc[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
    return {wk,del,esc,loss,lv,
      escP:del>0?esc/del*100:0, laP:esc>0?loss/esc*100:0,
      cpo:del>0?lv/del:0, aov:loss>0?lv/loss:0};
  });
}
function clientAgg(clients, weeks) {
  const out={};
  clients.forEach(c=>{
    let del=0,esc=0,loss=0,lv=0;
    weeks.forEach(wk=>{const d=(DB.wow.week_client[wk]||{})[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
    out[c]={del,esc,loss,lv,
      escP:del>0?esc/del*100:0, laP:esc>0?loss/esc*100:0,
      cpo:del>0?lv/del:0, aov:loss>0?lv/loss:0};
  });
  return out;
}
function monthAggForClients(months, clients) {
  return months.map(mo => {
    const m = DB.mom.months.find(x=>x.mo===mo); if (!m) return {mo,del:0,esc:0,loss:0,lv:0,escP:0,laP:0,cpo:0,aov:0};
    let del=0,esc=0,loss=0,lv=0;
    clients.forEach(c=>{const d=m.clients[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
    return {mo,del,esc,loss,lv,
      escP:del>0?esc/del*100:0, laP:esc>0?loss/esc*100:0,
      cpo:del>0?lv/del:0, aov:loss>0?lv/loss:0};
  });
}

// ── SORT ──────────────────────────────────────────────────────
function doSort(entries, tid='ov') {
  const {col,dir}=getSort(tid);
  return [...entries].sort((a,b)=>{
    const va=col==='name'?a[0].toLowerCase():(a[1][col]??0);
    const vb=col==='name'?b[0].toLowerCase():(b[1][col]??0);
    if(typeof va==='string') return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return dir==='desc'?vb-va:va-vb;
  });
}
// Sort a flat row array by column index
function sortRows(rows, cidx, numeric, tid) {
  const s = getSort(tid, '__none__', 'asc');
  return [...rows].sort((a,b)=>{
    const va = a[cidx], vb = b[cidx];
    if (numeric) return s.dir==='asc' ? (Number(va)||0)-(Number(vb)||0) : (Number(vb)||0)-(Number(va)||0);
    return s.dir==='asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
}
function clickSort(col, tid) {
  const s = getSort(tid||TAB);
  s.dir = (s.col===col && s.dir==='desc') ? 'asc' : 'desc';
  s.col = col;
  go();
}
function th(col, lbl, tid) {
  const s = getSort(tid||TAB);
  const a = s.col===col;
  const targ = tid||TAB;
  return `<th class="${a?'sa':''}" onclick="clickSort('${col}','${targ}')">${lbl}<span class="si">${a?(s.dir==='desc'?'▼':'▲'):'⇅'}</span></th>`;
}
// th for flat index-based tables (Trend summary tables)
function thF(label, cidx, numeric, tid) {
  const s = getSort(tid, '__none__', 'asc');
  const a = s.col===String(cidx);
  return `<th class="${a?'sa':''}" onclick="clickFlat('${tid}',${cidx},${numeric})">${label}<span class="si">${a?(s.dir==='desc'?'▼':'▲'):'⇅'}</span></th>`;
}
function clickFlat(tid, cidx, numeric) {
  const s = getSort(tid, '__none__', 'asc');
  s.dir = (s.col===String(cidx) && s.dir==='desc') ? 'asc' : 'desc';
  s.col = String(cidx);
  go();
}

// ── FORMAT ────────────────────────────────────────────────────
function f(v,t){
  if(v==null||isNaN(v))return'—';
  if(t==='p')  return v.toFixed(2)+'%';
  if(t==='cpo') return '₹'+v.toFixed(2);
  if(t==='r')   return '₹'+v.toFixed(2);
  if(t==='rv')  return '₹'+Math.round(v).toLocaleString('en-IN');
  if(t==='rk'){ if(v>=1e7)return'₹'+(v/1e7).toFixed(2)+'Cr';if(v>=1e5)return'₹'+(v/1e5).toFixed(1)+'L';return'₹'+Math.round(v).toLocaleString('en-IN');}
  if(t==='n')   return Math.round(v).toLocaleString('en-IN');
  if(t==='nk'){ if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return Math.round(v).toLocaleString('en-IN');}
  return Math.round(v).toLocaleString('en-IN');
}
function escCls(v){return v>=5?'pr':v>=2?'pa':v>=1?'pb':'pg';}
function laCls(v) {return v>=70?'pg':v>=40?'pb':v>=20?'pa':'pr';}
function badge(cur,prv,lG){
  if(prv==null)return'';
  const d=cur-prv;
  if(Math.abs(d)<0.001)return'<span class="wow neu">→ 0.00%</span>';
  const better=lG?d<0:d>0;
  return`<span class="wow ${better?'dn':'up'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(2)}%</span>`;
}
function bchip(c){
  if(BKT!=='all')return'';
  const aj=new Set(DB.meta.ajio);
  return aj.has(c)?'<span class="bchip ajio">AJIO</span>':'<span class="bchip nonajio">Non-AJIO</span>';
}

// ── CHARTS ────────────────────────────────────────────────────
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id];}}
const BASE={
  responsive:true,maintainAspectRatio:false,
  animation:{duration:800,easing:'easeOutQuart'},
  plugins:{
    legend:{labels:{color:'#64748b',font:{size:10},boxWidth:10,padding:10}},
    tooltip:{backgroundColor:'#fff',borderColor:'#e2e8f0',borderWidth:1,titleColor:'#1e2535',bodyColor:'#4a5568',padding:10,cornerRadius:8}
  },
  scales:{
    x:{ticks:{color:'#94a3b8',font:{size:10},maxRotation:45},grid:{color:'rgba(226,232,240,.5)'},border:{dash:[4,4]}},
    y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'rgba(226,232,240,.5)'},border:{dash:[4,4]}}
  }
};
const DL={id:'dl',afterDatasetsDraw(chart){
  const{ctx}=chart;
  chart.data.datasets.forEach((ds,di)=>{
    const meta=chart.getDatasetMeta(di);if(meta.hidden)return;
    meta.data.forEach((pt,i)=>{
      const val=ds.data[i];if(val==null||val===0)return;
      const fmt=chart._fmtY||(v=>'₹'+v.toFixed(2));
      ctx.save();ctx.font='bold 9px Inter,sans-serif';
      ctx.fillStyle=ds.borderColor||ds.backgroundColor;
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(fmt(val),pt.x,pt.y-6);ctx.restore();
    });
  });
}};
const HBL={id:'hbl',afterDatasetsDraw(chart){
  const{ctx,data}=chart;
  const meta=chart.getDatasetMeta(0);

// ── CLIENT-WISE DATASETS ──────────────────────────────────────
// When multiple clients are selected, each gets its own line.
// When only 1 or "All" clients → single combined aggregate line.
function clientDatasets(clients, metric, fmtY) {
  const isMonth = PERIOD === 'month';
  const showPerClient = SEL_CLIENTS.length >= 2;  // multi-client = per-client lines

  if (!showPerClient) {
    // Single combined line (default behaviour)
    const pAgg = getPeriodAgg(clients);
    return [{
      label: SEL_CLIENTS.length === 1 ? SEL_CLIENTS[0] : 'Overall',
      color: PAL[0],
      data:  pAgg.map(d => d[metric] ?? null)
    }];
  }

  // One line per selected client
  return clients.slice(0, 12).map((c, i) => {
    let data;
    if (isMonth) {
      data = getMonths().map(mo => {
        const m = DB.mom.months.find(x => x.mo === mo);
        const d = m?.clients[c];
        if (!d || d.del === 0) return null;
        if (metric === 'del')  return d.del;
        if (metric === 'esc')  return d.esc;
        if (metric === 'loss') return d.loss;
        if (metric === 'escP') return d.esc / d.del * 100;
        if (metric === 'laP')  return d.esc > 0 ? d.loss / d.esc * 100 : null;
        if (metric === 'cpo')  return d.lv / d.del;
        if (metric === 'aov')  return d.loss > 0 ? d.lv / d.loss : null;
        return null;
      });
    } else {
      const weeks = getWeeks();
      data = weeks.map(wk => {
        const r = (DB.wow.week_client[wk] || {})[c] || { del:0, esc:0, loss:0, lv:0 };
        if (r.del === 0) return null;
        if (metric === 'del')  return r.del;
        if (metric === 'esc')  return r.esc;
        if (metric === 'loss') return r.loss;
        if (metric === 'escP') return r.esc / r.del * 100;
        if (metric === 'laP')  return r.esc > 0 ? r.loss / r.esc * 100 : null;
        if (metric === 'cpo')  return r.lv / r.del;
        if (metric === 'aov')  return r.loss > 0 ? r.lv / r.loss : null;
        return null;
      });
    }
    return { label: c, color: PAL[i % 10], data };
  });
}

// ════════ OVERVIEW ════════
function renderOv(){
  const clients=filteredClients();
  // Period-aware aggregation
  const isMonth = PERIOD==='month';
  const pAgg    = getPeriodAgg(clients);
  const lbs     = pAgg.map(d=>d.lbl||d.wk?.replace('2026-','')||d.mo||'');
  const weeks   = getWeeks(); // still needed for weekly-del columns in table

  const tD=pAgg.reduce((s,d)=>s+d.del,0), tE=pAgg.reduce((s,d)=>s+d.esc,0);
  const tL=pAgg.reduce((s,d)=>s+d.loss,0), tV=pAgg.reduce((s,d)=>s+d.lv,0);
  const eP=tD>0?tE/tD*100:0, lP=tE>0?tL/tE*100:0, cpo=tD>0?tV/tD:0, aov=tL>0?tV/tL:0;

  // Client agg over the selected period
  const ca = isMonth
    ? (() => {
        const months=getMonths(), out={};
        clients.forEach(c=>{
          let del=0,esc=0,loss=0,lv=0;
          months.forEach(mo=>{const m=DB.mom.months.find(x=>x.mo===mo);const d=m?.clients[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
          out[c]={del,esc,loss,lv,escP:del>0?esc/del*100:0,laP:esc>0?loss/esc*100:0,cpo:del>0?lv/del:0,aov:loss>0?lv/loss:0};
        });
        return out;
      })()
    : clientAgg(clients, weeks);

  const sorted=doSort(Object.entries(ca),'ov');
  const mx=Math.max(...Object.values(ca).map(d=>d.del),1);

  // MoM data for table columns
  const allMo=DB.meta.months;
  const clientMoAgg={};
  clients.forEach(c=>{
    clientMoAgg[c]=allMo.map(mo=>{
      const m=DB.mom.months.find(x=>x.mo===mo);
      const d=m?.clients[c];
      if(!d)return{mo,escP:0,laP:0};
      return{mo,escP:d.del>0?d.esc/d.del*100:0,laP:d.esc>0?d.loss/d.esc*100:0};
    });
  });

  const periodLabel = isMonth ? 'Month' : 'Week';

  let h=`<div class="krow">
    <div class="kpi k-blue"   style="animation-delay:.0s"><div class="lb">Total Deliveries</div><div class="vl">${f(tD,'n')}</div><div class="sb">${clients.length} clients · ${pAgg.length} ${periodLabel.toLowerCase()}s</div></div>
    <div class="kpi k-red"    style="animation-delay:.05s"><div class="lb">Overall Esc %</div><div class="vl">${f(eP,'p')}</div><div class="sb">${f(tE,'n')} escalations</div></div>
    <div class="kpi k-green"  style="animation-delay:.1s"><div class="lb">Overall LA %</div><div class="vl">${f(lP,'p')}</div><div class="sb">${f(tL,'n')} accepted</div></div>
    <div class="kpi k-amber"  style="animation-delay:.15s"><div class="lb">AOV</div><div class="vl">${f(aov,'cpo')}</div><div class="sb">Loss Amt ÷ Loss Count</div></div>
    <div class="kpi k-purple" style="animation-delay:.2s"><div class="lb">Approx CPO</div><div class="vl">${f(cpo,'cpo')}</div><div class="sb">Loss Amt ÷ Del Count</div></div>
    <div class="kpi k-teal"   style="animation-delay:.25s"><div class="lb">Total Loss Value</div><div class="vl">${f(tV,'rv')}</div><div class="sb">${pAgg.length} ${periodLabel.toLowerCase()}s</div></div>
  </div>
  <div class="grid3">
    <div class="card"><div class="card-title">Deliveries — ${periodLabel} Trend</div><div style="position:relative;height:200px"><canvas id="ovDC"></canvas></div></div>
    <div class="card"><div class="card-title">Esc % — ${periodLabel} Trend</div><div style="position:relative;height:200px"><canvas id="ovEC"></canvas></div></div>
    <div class="card"><div class="card-title">LA % — ${periodLabel} Trend</div><div style="position:relative;height:200px"><canvas id="ovLC"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">AOV — ${periodLabel} Trend</div><div style="position:relative;height:200px"><canvas id="ovAC"></canvas></div></div>
    <div class="card"><div class="card-title">Approx CPO — ${periodLabel} Trend</div><div style="position:relative;height:200px"><canvas id="ovCC"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">Client Summary
    <span class="card-hint">↕ Sort · ${periodLabel} view · Esc% & LA% show Δ per ${periodLabel.toLowerCase()}</span></div>

    ${th('name','Client','ov')}${th('del','Total Del','ov')}${th('esc','Esc','ov')}${th('escP','Esc %','ov')}
    ${th('loss','Loss','ov')}${th('laP','LA %','ov')}${th('lv','Loss Value','ov')}${th('aov','AOV','ov')}${th('cpo','CPO','ov')}
    ${isMonth
      ? allMo.map(m=>`<th style="border-left:1px solid var(--border)">${m} Del</th><th>${m} Esc%</th><th>MoM Δ</th><th>${m} LA%</th><th>MoM Δ</th>`).join('')
      : weeks.map(w=>`<th style="border-left:1px solid var(--border)">${w.replace('2026-','')} Del</th><th>Esc%</th><th>WoW Δ</th>`).join('')
    }
  </tr></thead><tbody>`;

  sorted.forEach(([name,d])=>{
    const bar=`<span class="mbar" style="width:${Math.max(2,d.del/mx*50)}px;background:var(--blue);opacity:.3"></span>`;

      const moData=clientMoAgg[name]||[];
      periodCols=moData.map((m,i)=>{
        const mo=DB.mom.months.find(x=>x.mo===m.mo);
        const del=mo?.clients[name]?.del||0;
        const prev=i>0?moData[i-1]:null;
        // Esc% colour: red if up (worse), green if down (better)
        const eDiff=prev?m.escP-prev.escP:0;
        const eBg=prev?(eDiff>0.001?'background:#fff0f0;color:#dc2626;':eDiff<-0.001?'background:#f0fdf4;color:#16a34a;':''):'';
        const eArr=prev?(eDiff>0.001?'▲':eDiff<-0.001?'▼':'→'):'';
        // LA% colour: green if up (better), red if down (worse)
        const lDiff=prev?m.laP-prev.laP:0;
        const lBg=prev?(lDiff>0.001?'background:#f0fdf4;color:#16a34a;':lDiff<-0.001?'background:#fff0f0;color:#dc2626;':''):'';
        const lArr=prev?(lDiff>0.001?'▲':lDiff<-0.001?'▼':'→'):'';
        return`<td style="border-left:1px solid var(--border)">${f(del,'n')}</td>
          <td style="${eBg}font-weight:${prev?700:400}">${f(m.escP,'p')}</td>
          <td style="${eBg}font-size:10px;font-weight:700;text-align:center">${prev?`${eArr} ${Math.abs(eDiff).toFixed(2)}%`:''}</td>
          <td>${f(m.laP,'p')}</td>

      }).join('');
    } else {
      const wkEsc=weeks.map(wk=>{const r=(DB.wow.week_client[wk]||{})[name]||{del:0,esc:0};return r.del>0?r.esc/r.del*100:0;});

        const v=wkEsc[i], prev=i>0?wkEsc[i-1]:null;

        const isUp=prev!=null&&diff>0.001, isDn=prev!=null&&diff<-0.001;
        const bg=isUp?'background:#fff0f0;color:#dc2626;':isDn?'background:#f0fdf4;color:#16a34a;':'';
        const arrow=isUp?'▲':isDn?'▼':'→';
        return`<td style="border-left:1px solid var(--border)">${f(wkDel[i],'n')}</td>

  h+=`</tbody></table></div></div>`;
  document.getElementById('s-ov').innerHTML=h;

        const bg=isUp?'background:#fff0f0;color:#dc2626;':isDn?'background:#f0fdf4;color:#16a34a;':'';
        const arrow=isUp?'▲':isDn?'▼':'→';
        const absDiff=Math.abs(diff).toFixed(2);
        h+=`<td style="${bg}font-weight:700">${f(v,'p')}</td>`;
        h+=`<td style="${bg}font-size:10px;font-weight:700;text-align:center">${arrow} ${absDiff}%</td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-esc').innerHTML=h;
  const lbsEsc=getPeriodLabels();
  const multiClientEsc=SEL_CLIENTS.length>=2;
  if(multiClientEsc){
    // Each selected client gets its own Esc% line
    lineChart('escOC',lbsEsc,clientDatasets(clients,'escP'),v=>v==null?'':v.toFixed(2)+'%',230);
    lineChart('escCC',lbsEsc,clientDatasets(clients,'del'),v=>v==null?'':f(v,'n'),230);
  } else {
    comboChart('escOC',lbs,
      {label:'Delivery Count',color:'#94a3b8',data:pAgg.map(d=>d.del)},
      {label:'Esc %',color:'#ef4444',data:pAgg.map(d=>d.escP)},
      v=>f(v,'n'),v=>v.toFixed(2)+'%',230);
    if(isMonth){
      lineChart('escCC',lbs,top8.map((c,i)=>({label:c,color:PAL[i%10],
        data:getMonths().map(mo=>{const m=DB.mom.months.find(x=>x.mo===mo);const d=m?.clients[c];return d&&d.del>0?d.esc/d.del*100:null;})})),
        v=>v==null?'':v.toFixed(2)+'%',230);
    } else {
      const weeks=getWeeks();
      lineChart('escCC',lbs,top8.map((c,i)=>({label:c,color:PAL[i%10],

        v=>v==null?'':v.toFixed(2)+'%',230);
    }
  }
}
