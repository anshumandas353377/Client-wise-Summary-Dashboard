<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Wise Dashboard · Jan 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#f0f3fa;--border:#e2e8f0;
  --text:#1e2535;--text2:#4a5568;--text3:#94a3b8;
  --blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--teal:#06b6d4;
  --ajio:#3b82f6;--nonajio:#10b981;--overall:#8b5cf6;
  --shadow:0 2px 8px rgba(30,37,53,.08);--shadow-md:0 4px 16px rgba(30,37,53,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 2px 8px rgba(59,130,246,.3);}
.logo h1{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.logo .sub{font-size:10px;color:var(--text3);margin-top:1px;}
.excl-badge{font-size:10px;background:#fef2f2;color:var(--red);border:1px solid #fecaca;padding:2px 8px;border-radius:20px;margin-left:8px;white-space:nowrap;}

/* ── FILTERS ── */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-bottom:8px;}
.fg{display:flex;align-items:center;gap:5px;}
.fg label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
select,input[type=text]{font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none;font-family:inherit;cursor:pointer;transition:border-color .15s;box-shadow:var(--shadow);}
select:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
input[type=text]{width:145px;}

/* ── BUCKET PILLS ── */
.bucket-bar{display:flex;gap:6px;padding:7px 0 10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.bkt{font-size:11px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);}
.bkt:hover{border-color:var(--text3);transform:translateY(-1px);}
.bkt.on.b-all   {background:var(--overall);border-color:var(--overall);color:#fff;box-shadow:0 4px 12px rgba(139,92,246,.35);}
.bkt.on.b-ajio  {background:var(--ajio);border-color:var(--ajio);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.35);}
.bkt.on.b-nonajio{background:var(--nonajio);border-color:var(--nonajio);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.35);}
.bkt-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 20px;gap:0;overflow-x:auto;}
.tab{font-size:12px;padding:10px 18px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2.5px solid transparent;margin-bottom:-2px;font-family:inherit;white-space:nowrap;font-weight:500;transition:all .2s;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
.tab:hover:not(.on){color:var(--text2);background:var(--surface2);}

/* ── BODY ── */
.body{padding:16px 20px;max-width:1500px;margin:0 auto;}

/* ── KPI ── */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:14px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease both;}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.kpi.k-blue::before{background:linear-gradient(90deg,var(--blue),#60a5fa);}
.kpi.k-green::before{background:linear-gradient(90deg,var(--green),#34d399);}
.kpi.k-amber::before{background:linear-gradient(90deg,var(--amber),#fbbf24);}
.kpi.k-red::before{background:linear-gradient(90deg,var(--red),#f87171);}
.kpi.k-purple::before{background:linear-gradient(90deg,var(--purple),#a78bfa);}
.kpi.k-teal::before{background:linear-gradient(90deg,var(--teal),#22d3ee);}
.kpi .lb{font-size:10px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.kpi .vl{font-size:22px;font-weight:700;color:var(--text);line-height:1;}
.kpi .sb{font-size:10px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);animation:fadeUp .45s ease both;}
.card-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-hint{font-size:10px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:860px){.grid2,.grid3{grid-template-columns:1fr;}}

/* ── TABLE ── */
.tw{overflow-x:auto;max-height:460px;overflow-y:auto;}
.tw::-webkit-scrollbar{width:5px;height:5px;}.tw::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th{font-size:10px;font-weight:700;color:var(--text3);padding:8px 10px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--surface);z-index:1;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;transition:color .15s;}
th:first-child{text-align:left;}
th:hover{color:var(--blue);}
th.sa{color:var(--blue);}
th .si{display:inline-block;font-size:9px;margin-left:3px;width:9px;}
th.sa .si{color:var(--blue);}
td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);transition:background .1s;}
td:first-child{text-align:left;font-weight:600;color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis;}
/* row animation */
tbody tr{animation:rowSlide .3s ease both;}
tbody tr:nth-child(1){animation-delay:.02s;}
tbody tr:nth-child(2){animation-delay:.04s;}
tbody tr:nth-child(3){animation-delay:.06s;}
tbody tr:nth-child(4){animation-delay:.08s;}
tbody tr:nth-child(5){animation-delay:.1s;}
tbody tr:nth-child(6){animation-delay:.12s;}
tbody tr:nth-child(7){animation-delay:.14s;}
tbody tr:nth-child(8){animation-delay:.16s;}
tbody tr:nth-child(9){animation-delay:.18s;}
tbody tr:nth-child(10){animation-delay:.2s;}
tr:hover td{background:#f0f7ff;}
tr:last-child td{border-bottom:none;}
/* alternating row */
tbody tr:nth-child(even) td{background:#fafbff;}
tbody tr:nth-child(even):hover td{background:#f0f7ff;}

/* ── PILLS ── */
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.pr{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.pg{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.pa{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
.pb{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.pn{background:#f8fafc;color:var(--text3);border:1px solid var(--border);}
.wow{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;}
.wow.up{background:#fef2f2;color:#dc2626;}
.wow.dn{background:#f0fdf4;color:#16a34a;}
.wow.neu{color:var(--text3);}
.bchip{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:4px;vertical-align:middle;}
.bchip.ajio{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.bchip.nonajio{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.mbar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-left:6px;min-width:2px;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes rowSlide{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}

.sec{display:none;}.sec.on{display:block;}
</style>
</head>

  if(BKT==='nonajio')return!AJIO_SET.has(c);
  return true;
}
function setBkt(b,btn){
  BKT=b;
  document.querySelectorAll('.bkt').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('clf').value='';
  go();
}

/* ── filters ── */
function getWeeks(){const n=parseInt(document.getElementById('wkf').value)||6;return RAW.weeks.slice(-n);}
function getMinDel(){return parseInt(document.getElementById('mnd').value)||0;}
function getSearch(){return document.getElementById('srch').value.toLowerCase();}
function filteredClients(){
  const cl=document.getElementById('clf').value,md=getMinDel(),sq=getSearch();
  return RAW.clients.filter(c=>{
    if(!inBkt(c))return false;
    if(cl&&c!==cl)return false;
    if(sq&&!c.toLowerCase().includes(sq))return false;
    if((RAW.client_summary[c]?.del||0)<md)return false;
    return true;
  });
}

/* ── aggregation ── */
function weekAgg(weeks,clients){
  return weeks.map(wk=>{
    const wc=RAW.week_client[wk]||{};let del=0,esc=0,loss=0,lv=0;
    clients.forEach(c=>{const d=wc[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
    return{wk,del,esc,loss,lv,
      escP:del>0?esc/del*100:0,laP:esc>0?loss/esc*100:0,
      cpo:del>0?lv/del:0,aov:loss>0?lv/loss:0};
  });
}
function clientAgg(clients,weeks){
  const out={};
  clients.forEach(c=>{
    let del=0,esc=0,loss=0,lv=0;
    weeks.forEach(wk=>{const d=(RAW.week_client[wk]||{})[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
    out[c]={del,esc,loss,lv,
      escP:del>0?esc/del*100:0,laP:esc>0?loss/esc*100:0,
      cpo:del>0?lv/del:0,aov:loss>0?lv/loss:0};
  });
  return out;
}

/* ── sort ── */
function doSort(entries){
  const{col,dir}=SORT;
  return[...entries].sort((a,b)=>{
    const va=col==='name'?a[0].toLowerCase():(a[1][col]??0);
    const vb=col==='name'?b[0].toLowerCase():(b[1][col]??0);
    if(typeof va==='string')return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return dir==='desc'?vb-va:va-vb;
  });
}
function clickSort(col){
  SORT.dir=(SORT.col===col&&SORT.dir==='desc')?'asc':'desc';
  SORT.col=col;go();
}
function th(col,lbl){
  const a=SORT.col===col;
  const arrow=a?(SORT.dir==='desc'?'▼':'▲'):'⇅';
  return`<th class="${a?'sa':''}" onclick="clickSort('${col}')">${lbl}<span class="si">${arrow}</span></th>`;
}

/* ── format ── */
function f(v,t){
  if(v==null||isNaN(v))return'—';
  if(t==='p')return v.toFixed(2)+'%';
  if(t==='r')return'₹'+Math.round(v).toLocaleString('en-IN');
  if(t==='rk'){if(v>=1e7)return'₹'+(v/1e7).toFixed(2)+'Cr';if(v>=1e5)return'₹'+(v/1e5).toFixed(1)+'L';return'₹'+Math.round(v).toLocaleString('en-IN');}
  if(t==='nk'){if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return Math.round(v).toLocaleString('en-IN');}
  return Math.round(v).toLocaleString('en-IN');
}
function escCls(v){return v>=5?'pr':v>=2?'pa':v>=1?'pb':'pg';}
function laCls(v){return v>=70?'pg':v>=40?'pb':v>=20?'pa':'pr';}
function badge(cur,prv,lG){
  if(prv==null)return'';const d=cur-prv;
  if(Math.abs(d)<0.001)return'<span class="wow neu">→ 0.00%</span>';
  const better=lG?d<0:d>0;
  return`<span class="wow ${better?'dn':'up'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(2)}%</span>`;
}
function bchip(c){
  if(BKT!=='all')return'';
  return AJIO_SET.has(c)
    ?'<span class="bchip ajio">AJIO</span>'
    :'<span class="bchip nonajio">Non-AJIO</span>';
}

/* ── chart helpers ── */
function dc(id){if(CH[id]){CH[id].destroy();delete CH[id];}}

// shared chart options (light theme)
const BASE_OPTS={
  responsive:true,maintainAspectRatio:false,
  animation:{duration:900,easing:'easeOutQuart'},
  plugins:{
    legend:{labels:{color:'#64748b',font:{size:10},boxWidth:10,padding:10}},
    tooltip:{
      backgroundColor:'#fff',borderColor:'#e2e8f0',borderWidth:1,
      titleColor:'#1e2535',bodyColor:'#4a5568',
      padding:10,cornerRadius:8,
      boxShadow:'0 4px 16px rgba(30,37,53,.12)'
    }
  },
  scales:{
    x:{ticks:{color:'#94a3b8',font:{size:10},maxRotation:45},
       grid:{color:'rgba(226,232,240,.6)'},
       border:{dash:[4,4]}},
    y:{ticks:{color:'#94a3b8',font:{size:10}},
       grid:{color:'rgba(226,232,240,.6)'},
       border:{dash:[4,4]}}
  }
};

function lineChart(id,labels,datasets,fmtY,h=215,showDataLabels=true){
  dc(id);const el=document.getElementById(id);if(!el)return;
  el.parentElement.style.height=h+'px';
  const opts=JSON.parse(JSON.stringify(BASE_OPTS));
  opts.plugins.tooltip.callbacks={label:c=>`${c.dataset.label}: ${fmtY(c.parsed.y)}`};
  opts.scales.y.ticks.callback=fmtY;
  // data labels above points
  if(showDataLabels){
    opts.plugins.datalabels=false; // no plugin needed – use afterDraw
  }
  CH[id]=new Chart(el,{type:'line',
    data:{labels,datasets:datasets.map((d,i)=>({
      label:d.label,data:d.data,
      borderColor:d.color||PAL[i%10],
      backgroundColor:(d.color||PAL[i%10])+'22',
      borderWidth:2.5,pointRadius:5,pointHoverRadius:7,
      pointBackgroundColor:d.color||PAL[i%10],
      pointBorderColor:'#fff',pointBorderWidth:2,
      tension:0.35,fill:false,borderDash:d.dash||[]
    }))},
    options:opts,
    plugins:[{
      id:'dataLabels',
      afterDatasetsDraw(chart){
        const{ctx}=chart;
        chart.data.datasets.forEach((ds,di)=>{
          const meta=chart.getDatasetMeta(di);
          if(meta.hidden)return;
          meta.data.forEach((pt,i)=>{
            const val=ds.data[i];
            if(val==null)return;
            const txt=fmtY(val);
            ctx.save();
            ctx.font='bold 9px Inter,sans-serif';
            ctx.fillStyle=ds.borderColor;
            ctx.textAlign='center';
            ctx.textBaseline='bottom';
            ctx.fillText(txt,pt.x,pt.y-8);
            ctx.restore();
          });
        });
      }
    }]
  });
}

function hbar(id,labels,vals,colors,fmtY,h=260){
  dc(id);const el=document.getElementById(id);if(!el)return;
  el.parentElement.style.height=h+'px';
  const opts=JSON.parse(JSON.stringify(BASE_OPTS));
  opts.indexAxis='y';
  opts.plugins.tooltip.callbacks={label:c=>`${fmtY(c.parsed.x)}`};
  CH[id]=new Chart(el,{type:'bar',
    data:{labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:5,borderSkipped:false}]},
    options:opts,
    plugins:[{
      id:'barLabels',
      afterDatasetsDraw(chart){
        const{ctx}=chart;
        const meta=chart.getDatasetMeta(0);
        meta.data.forEach((bar,i)=>{
          const val=vals[i];if(!val)return;
          const txt=fmtY(val);
          ctx.save();
          ctx.font='bold 10px Inter,sans-serif';
          ctx.fillStyle='#4a5568';
          ctx.textAlign='left';
          ctx.textBaseline='middle';
          ctx.fillText(txt,bar.x+6,bar.y);

  });
}

/* ══════════════════════ AOV & CPO ══════════════════════ */
function renderAOV(){
  const clients=filteredClients(),weeks=getWeeks();
  const agg=weekAgg(weeks,clients);
  const last=agg[agg.length-1];
  const ca=clientAgg(clients,weeks);
  const withData=Object.entries(ca).filter(([,d])=>d.loss>0&&d.del>0);
  const byAov=[...withData].sort((a,b)=>b[1].aov-a[1].aov);
  const byCpo=[...withData].sort((a,b)=>b[1].cpo-a[1].cpo);
  const tV=agg.reduce((s,d)=>s+d.lv,0);
  const lbs=agg.map(d=>d.wk.replace('2026-',''));

  let h=`<div class="krow">
    <div class="kpi k-amber" style="animation-delay:.0s"><div class="lb">Overall AOV</div><div class="vl">${f(last.aov,'r')}</div><div class="sb">Loss Amt ÷ Loss Count</div></div>
    <div class="kpi k-purple" style="animation-delay:.05s"><div class="lb">Overall Approx CPO</div><div class="vl">${f(last.cpo,'r')}</div><div class="sb">Loss Amt ÷ Del Count</div></div>
    <div class="kpi k-amber" style="animation-delay:.1s"><div class="lb">Highest AOV</div><div class="vl" style="font-size:13px;margin-top:3px">${byAov[0]?.[0]||'—'}</div><div class="sb">${f(byAov[0]?.[1]?.aov,'r')}</div></div>
    <div class="kpi k-purple" style="animation-delay:.15s"><div class="lb">Highest CPO</div><div class="vl" style="font-size:13px;margin-top:3px">${byCpo[0]?.[0]||'—'}</div><div class="sb">${f(byCpo[0]?.[1]?.cpo,'r')}</div></div>
    <div class="kpi k-teal" style="animation-delay:.2s"><div class="lb">Total Loss Value</div><div class="vl">${f(tV,'rk')}</div><div class="sb">${weeks.length} weeks</div></div>
  </div>
  <div class="grid2">
    <div class="card" style="animation-delay:.1s"><div class="card-title">AOV — WoW Trend</div><div style="position:relative;height:230px"><canvas id="aovTC"></canvas></div></div>
    <div class="card" style="animation-delay:.15s"><div class="card-title">Approx CPO — WoW Trend</div><div style="position:relative;height:230px"><canvas id="cpoTC"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="card" style="animation-delay:.2s"><div class="card-title">Top 20 by AOV</div><div style="position:relative;height:280px"><canvas id="aovBC"></canvas></div></div>
    <div class="card" style="animation-delay:.25s"><div class="card-title">Top 20 by Approx CPO</div><div style="position:relative;height:280px"><canvas id="cpoBC"></canvas></div></div>
  </div>
  <div class="card" style="animation-delay:.3s">
    <div class="card-title">Client-wise AOV &amp; CPO <span class="card-hint">↕ Click headers to sort</span></div>
    <div class="tw"><table><thead><tr>
      ${th('name','Client')}${th('del','Del Count')}${th('loss','Loss Count')}${th('lv','Loss Value')}${th('aov','AOV')}${th('cpo','Approx CPO')}${th('laP','LA %')}${th('escP','Esc %')}
    </tr></thead><tbody>`;
  doSort(withData).forEach(([name,d])=>{
    h+=`<tr><td title="${name}">${name}${bchip(name)}</td>
      <td>${f(d.del,'nk')}</td><td>${f(d.loss,'nk')}</td><td>${f(d.lv,'rk')}</td>
      <td><strong style="color:#d97706">${f(d.aov,'r')}</strong></td>
      <td><strong style="color:#7c3aed">${f(d.cpo,'r')}</strong></td>
      <td><span class="pill ${laCls(d.laP)}">${f(d.laP,'p')}</span></td>
      <td><span class="pill ${escCls(d.escP)}">${f(d.escP,'p')}</span></td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-aov').innerHTML=h;
  lineChart('aovTC',lbs,[{label:'AOV',color:'#f59e0b',data:agg.map(d=>d.aov)}],v=>'₹'+Math.round(v).toLocaleString('en-IN'),230);
  lineChart('cpoTC',lbs,[{label:'CPO',color:'#8b5cf6',data:agg.map(d=>d.cpo)}],v=>'₹'+Math.round(v).toLocaleString('en-IN'),230);
  hbar('aovBC',byAov.slice(0,20).map(([c])=>c.length>18?c.slice(0,17)+'…':c),byAov.slice(0,20).map(([,d])=>d.aov),
    byAov.slice(0,20).map((_,i)=>PAL[i%10]+'99'),v=>'₹'+Math.round(v).toLocaleString('en-IN'));
  setTimeout(()=>hbar('cpoBC',byCpo.slice(0,20).map(([c])=>c.length>18?c.slice(0,17)+'…':c),byCpo.slice(0,20).map(([,d])=>d.cpo),
    byCpo.slice(0,20).map(([,d])=>d.cpo>=30?'#ef444488':d.cpo>=15?'#f59e0b88':d.cpo>=5?'#3b82f688':'#10b98188'),
    v=>'₹'+Math.round(v).toLocaleString('en-IN')),80);
}

/* ══════════════════════ MoM ══════════════════════ */
function renderMom(){
  const clients=filteredClients(),months=RAW.months;
  const monthAgg=months.map(mo=>{
    const mc=RAW.month_client[mo]||{};let del=0,esc=0,loss=0,lv=0;
    clients.forEach(c=>{const d=mc[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
    return{mo,del,esc,loss,lv,escP:del>0?esc/del*100:0,laP:esc>0?loss/esc*100:0,cpo:del>0?lv/del:0,aov:loss>0?lv/loss:0};
  });
  const last=monthAgg[monthAgg.length-1],prev=monthAgg[monthAgg.length-2];
  const lbs=monthAgg.map(d=>d.mo);
  // top 8 by total del
  const caAll=clientAgg(clients,RAW.weeks);
  const top8=Object.entries(caAll).sort((a,b)=>b[1].del-a[1].del).slice(0,8).map(([c])=>c);

  let h=`<div class="krow">
    <div class="kpi k-blue" style="animation-delay:.0s"><div class="lb">Latest Month</div><div class="vl">${last.mo}</div><div class="sb">${f(last.del,'nk')} deliveries</div></div>
    <div class="kpi k-red" style="animation-delay:.05s"><div class="lb">Esc % Latest</div><div class="vl">${f(last.escP,'p')}</div><div class="sb">${badge(last.escP,prev?.escP,true)} MoM</div></div>
    <div class="kpi k-green" style="animation-delay:.1s"><div class="lb">LA % Latest</div><div class="vl">${f(last.laP,'p')}</div><div class="sb">${badge(last.laP,prev?.laP,false)} MoM</div></div>
    <div class="kpi k-amber" style="animation-delay:.15s"><div class="lb">AOV Latest</div><div class="vl">${f(last.aov,'r')}</div><div class="sb">Loss Amt ÷ Loss Count</div></div>
    <div class="kpi k-purple" style="animation-delay:.2s"><div class="lb">CPO Latest</div><div class="vl">${f(last.cpo,'r')}</div><div class="sb">Loss Amt ÷ Del Count</div></div>
  </div>
  <div class="grid2">
    <div class="card" style="animation-delay:.1s"><div class="card-title">Esc % — MoM</div><div style="position:relative;height:230px"><canvas id="momEC"></canvas></div></div>
    <div class="card" style="animation-delay:.15s"><div class="card-title">LA % — MoM</div><div style="position:relative;height:230px"><canvas id="momLC"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="card" style="animation-delay:.2s"><div class="card-title">AOV — MoM</div><div style="position:relative;height:230px"><canvas id="momAC"></canvas></div></div>
    <div class="card" style="animation-delay:.25s"><div class="card-title">Approx CPO — MoM</div><div style="position:relative;height:230px"><canvas id="momCC"></canvas></div></div>
  </div>
  <div class="card" style="animation-delay:.3s"><div class="card-title">Esc % by Client — MoM (top 8 by volume)</div><div style="position:relative;height:260px"><canvas id="momCLC"></canvas></div></div>
  <div class="card" style="animation-delay:.35s"><div class="card-title">Month-wise Summary</div>
  <div class="tw"><table><thead><tr>
    <th>Month</th><th>Deliveries</th><th>Esc Count</th><th>Esc %</th><th>Loss Count</th><th>LA %</th><th>Loss Value</th><th>AOV</th><th>Approx CPO</th>
  </tr></thead><tbody>`;
  monthAgg.forEach((d,i)=>{
    const p=i>0?monthAgg[i-1]:null;
    h+=`<tr><td>${d.mo}</td><td>${f(d.del,'nk')}</td><td>${f(d.esc,'nk')}</td>
      <td>${f(d.escP,'p')} ${p?badge(d.escP,p.escP,true):''}</td>
      <td>${f(d.loss,'nk')}</td>
      <td>${f(d.laP,'p')} ${p?badge(d.laP,p.laP,false):''}</td>
      <td>${f(d.lv,'rk')}</td><td>${f(d.aov,'r')}</td><td>${f(d.cpo,'r')}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-mom').innerHTML=h;
  lineChart('momEC',lbs,[{label:'Esc %',color:'#ef4444',data:monthAgg.map(d=>d.escP)}],v=>v.toFixed(2)+'%',230);
  lineChart('momLC',lbs,[{label:'LA %',color:'#10b981',data:monthAgg.map(d=>d.laP)}],v=>v.toFixed(2)+'%',230);
  lineChart('momAC',lbs,[{label:'AOV',color:'#f59e0b',data:monthAgg.map(d=>d.aov)}],v=>'₹'+Math.round(v).toLocaleString('en-IN'),230);
  lineChart('momCC',lbs,[{label:'CPO',color:'#8b5cf6',data:monthAgg.map(d=>d.cpo)}],v=>'₹'+Math.round(v).toLocaleString('en-IN'),230);
  lineChart('momCLC',lbs,top8.map((c,i)=>({label:c,color:PAL[i%10],
    data:months.map(mo=>{const d=(RAW.month_client[mo]||{})[c]||{del:0,esc:0};return d.del>0?d.esc/d.del*100:null;})})),
    v=>v==null?'':v.toFixed(2)+'%',260);
}

go();
</script>
