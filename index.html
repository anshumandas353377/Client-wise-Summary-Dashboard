<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Wise Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>


:root{
  --bg:#f4f6fb;--surface:#fff;--surface2:#f0f3fa;--border:#e2e8f0;
  --text:#1e2535;--text2:#4a5568;--text3:#94a3b8;
  --blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;--teal:#06b6d4;
  --ajio:#3b82f6;--nonajio:#10b981;--overall:#8b5cf6;
  --sh:0 2px 8px rgba(30,37,53,.08);--shm:0 4px 16px rgba(30,37,53,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200;box-shadow:var(--sh);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(59,130,246,.3);}
.logo h1{font-size:14px;font-weight:700;letter-spacing:-.01em;}
.logo .sub{font-size:10px;color:var(--text3);}
.badge{font-size:10px;background:#fef2f2;color:var(--red);border:1px solid #fecaca;padding:2px 8px;border-radius:20px;margin-left:8px;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;padding-bottom:8px;align-items:center;}
.fg{display:flex;align-items:center;gap:5px;}
.fg label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
select,input[type=text]{font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;outline:none;cursor:pointer;transition:border .15s;box-shadow:var(--sh);}
select:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
input[type=text]{width:145px;}
.msel{position:relative;}
.msel-btn{font-size:11px;padding:5px 9px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;outline:none;cursor:pointer;transition:border .15s;box-shadow:var(--sh);min-width:130px;display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap;}
.msel-btn:hover{border-color:var(--text3);}
.msel-arrow{font-size:9px;color:var(--text3);}
.msel-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shm);z-index:300;min-width:220px;max-width:300px;overflow:hidden;}
.msel-panel.open{display:block;}
.msel-quick{display:flex;gap:4px;padding:8px;border-bottom:1px solid var(--border);}
.msel-quick button{font-size:10px;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit;}
.msel-quick button:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
.msel-search{width:100%;border:none;border-bottom:1px solid var(--border);padding:8px 10px;font-size:11px;outline:none;font-family:inherit;box-shadow:none;border-radius:0;}
.msel-list{max-height:260px;overflow-y:auto;padding:4px 0;}
.msel-list::-webkit-scrollbar{width:4px;}.msel-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msel-item{display:flex;align-items:center;gap:7px;padding:6px 10px;font-size:11px;cursor:pointer;color:var(--text2);}
.msel-item:hover{background:var(--surface2);}
.msel-item input{cursor:pointer;width:13px;height:13px;accent-color:var(--blue);box-shadow:none;}
.msel-item.checked{color:var(--text);font-weight:600;}
.refresh-btn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;box-shadow:var(--sh);transition:all .15s;}
.refresh-btn:hover{background:var(--surface2);}
.bucket-bar{display:flex;gap:6px;padding:7px 0 10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.bkt{font-size:11px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px;}
.bkt:hover{transform:translateY(-1px);border-color:var(--text3);}
.bkt.on.b-all   {background:var(--overall);border-color:var(--overall);color:#fff;box-shadow:0 4px 12px rgba(139,92,246,.3);}
.bkt.on.b-ajio  {background:var(--ajio);border-color:var(--ajio);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.3);}
.bkt.on.b-nonajio{background:var(--nonajio);border-color:var(--nonajio);color:#fff;box-shadow:0 4px 12px rgba(16,185,129,.3);}
.bkt-dot{width:7px;height:7px;border-radius:50%;}
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto;}
.tab{font-size:12px;padding:10px 18px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2.5px solid transparent;margin-bottom:-2px;font-family:inherit;white-space:nowrap;font-weight:500;transition:all .2s;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
.tab:hover:not(.on){color:var(--text2);background:var(--surface2);}
.body{padding:16px 20px;max-width:1500px;margin:0 auto;}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:14px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;animation:fadeUp .4s ease both;}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shm);}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
.kpi.k-blue::before{background:linear-gradient(90deg,var(--blue),#60a5fa);}
.kpi.k-green::before{background:linear-gradient(90deg,var(--green),#34d399);}
.kpi.k-amber::before{background:linear-gradient(90deg,var(--amber),#fbbf24);}
.kpi.k-red::before{background:linear-gradient(90deg,var(--red),#f87171);}
.kpi.k-purple::before{background:linear-gradient(90deg,var(--purple),#a78bfa);}
.kpi.k-teal::before{background:linear-gradient(90deg,var(--teal),#22d3ee);}
.kpi .lb{font-size:10px;color:var(--text3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.kpi .vl{font-size:22px;font-weight:700;line-height:1;}
.kpi .sb{font-size:10px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh);animation:fadeUp .45s ease both;}
.card-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between;}
.card-hint{font-size:10px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
@media(max-width:860px){.grid2{grid-template-columns:1fr;}}
.tw{overflow-x:auto;max-height:460px;overflow-y:auto;}
.tw::-webkit-scrollbar{width:5px;height:5px;}.tw::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th{font-size:10px;font-weight:700;color:var(--text3);padding:8px 10px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--surface);z-index:1;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;transition:color .15s;}
th:first-child{text-align:left;}
th:hover{color:var(--blue);}
th.sa{color:var(--blue);}
th .si{display:inline-block;font-size:9px;margin-left:3px;width:9px;}
td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);color:var(--text2);}
td:first-child{text-align:left;font-weight:600;color:var(--text);max-width:220px;overflow:hidden;text-overflow:ellipsis;}
tbody tr{animation:rowSlide .3s ease both;}
tbody tr:nth-child(1){animation-delay:.02s;}tbody tr:nth-child(2){animation-delay:.04s;}
tbody tr:nth-child(3){animation-delay:.06s;}tbody tr:nth-child(4){animation-delay:.08s;}
tbody tr:nth-child(5){animation-delay:.1s;} tbody tr:nth-child(6){animation-delay:.12s;}
tbody tr:nth-child(7){animation-delay:.14s;}tbody tr:nth-child(8){animation-delay:.16s;}
tbody tr:nth-child(9){animation-delay:.18s;}tbody tr:nth-child(10){animation-delay:.2s;}
tr:hover td{background:#f0f7ff;}
tbody tr:nth-child(even) td{background:#fafbff;}
tbody tr:nth-child(even):hover td{background:#f0f7ff;}
tr:last-child td{border-bottom:none;}
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.pr{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.pg{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.pa{background:#fffbeb;color:#d97706;border:1px solid #fde68a;}
.pb{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.pn{background:#f8fafc;color:var(--text3);border:1px solid var(--border);}
.wow{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;}
.wow.up{background:#fef2f2;color:#dc2626;}.wow.dn{background:#f0fdf4;color:#16a34a;}.wow.neu{color:var(--text3);}
.bchip{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700;margin-left:4px;}
.bchip.ajio{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.bchip.nonajio{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;}
.mbar{display:inline-block;height:5px;border-radius:3px;vertical-align:middle;margin-left:6px;min-width:2px;}
.loader{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:20px 24px;color:#dc2626;font-size:12px;margin:20px 0;line-height:1.7;}
.err-box code{background:#fff;padding:2px 6px;border-radius:4px;border:1px solid #fecaca;font-size:11px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes rowSlide{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.sec{display:none;}.sec.on{display:block;}


</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-icon">📦</div>
      <div>
        <h1>Client Wise Summary Dashboard
          <span class="badge">Meesho &amp; FTPL Excluded</span>
        </h1>
        <div class="sub" id="dataSubtitle">Loading data…</div>
      </div>
    </div>
    <div class="filter-bar">
      <div class="fg"><label>Weeks</label>
        <div class="msel" id="wkfWrap">
          <button type="button" class="msel-btn" onclick="toggleMsel('wkf')">Last 6 Weeks <span class="msel-arrow">▾</span></button>
          <div class="msel-panel" id="wkfPanel">
            <div class="msel-quick">
              <button type="button" onclick="quickWeeks(6)">Last 6</button>
              <button type="button" onclick="quickWeeks(8)">Last 8</button>
              <button type="button" onclick="quickWeeks(12)">Last 12</button>
              <button type="button" onclick="quickWeeks(0)">All</button>
            </div>
            <div class="msel-list" id="wkfList"></div>
          </div>
        </div>
      </div>
      <div class="fg"><label>Client</label>
        <div class="msel" id="clfWrap">
          <button type="button" class="msel-btn" onclick="toggleMsel('clf')">All Clients <span class="msel-arrow">▾</span></button>
          <div class="msel-panel" id="clfPanel">
            <input type="text" class="msel-search" id="clfSearch" placeholder="Filter clients…" oninput="renderClientList()">
            <div class="msel-quick">
              <button type="button" onclick="selectAllClients(true)">Select All</button>
              <button type="button" onclick="selectAllClients(false)">Clear</button>
            </div>
            <div class="msel-list" id="clfList"></div>
          </div>
        </div>
      </div>
      <div class="fg"><label>Min Del</label>
        <div class="msel" id="mndWrap">
          <button type="button" class="msel-btn" onclick="toggleMsel('mnd')" style="min-width:110px">No Minimum <span class="msel-arrow">▾</span></button>
          <div class="msel-panel" id="mndPanel" style="min-width:200px">
            <div class="msel-quick" style="flex-wrap:wrap;">
              <button type="button" onclick="setMinDel(0)">No Min</button>
              <button type="button" onclick="setMinDel(50)">50+</button>
              <button type="button" onclick="setMinDel(100)">100+</button>
              <button type="button" onclick="setMinDel(500)">500+</button>
              <button type="button" onclick="setMinDel(1000)">1K+</button>
              <button type="button" onclick="setMinDel(5000)">5K+</button>
              <button type="button" onclick="setMinDel(10000)">10K+</button>
              <button type="button" onclick="setMinDel(50000)">50K+</button>
              <button type="button" onclick="setMinDel(100000)">100K+</button>
            </div>
            <div style="padding:8px 10px;border-top:1px solid var(--border);">
              <label style="display:block;font-size:10px;color:var(--text3);margin-bottom:4px;">Custom value</label>
              <input type="number" id="mndCustom" placeholder="e.g. 2500" style="width:100%" min="0" onchange="setMinDel(this.value)">
            </div>
          </div>
        </div>
      </div>
      <div class="fg"><label>Search</label>
        <input type="text" id="srch" placeholder="Search client…" oninput="go()">
      </div>
      <button class="refresh-btn" onclick="refreshData()">⟳ Refresh</button>
      <button class="refresh-btn" id="pdfBtn" onclick="downloadPdf()">⬇ Download PDF</button>
    </div>
  </div>
  <div class="bucket-bar">
    <button class="bkt b-all on"    onclick="setBkt('all',this)"><span class="bkt-dot" style="background:#fff;opacity:.8"></span>Overall</button>
    <button class="bkt b-ajio"      onclick="setBkt('ajio',this)"><span class="bkt-dot" style="background:var(--ajio)"></span>AJIO</button>
    <button class="bkt b-nonajio"   onclick="setBkt('nonajio',this)"><span class="bkt-dot" style="background:var(--nonajio)"></span>Non Meesho Non AJIO</button>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="sw('ov',this)">📋 Overview</button>
  <button class="tab"    onclick="sw('esc',this)">⚠️ Escalation % WoW</button>
  <button class="tab"    onclick="sw('la',this)">✅ Loss Accepted %</button>
  <button class="tab"    onclick="sw('aov',this)">💰 AOV &amp; CPO</button>
  <button class="tab"    onclick="sw('mom',this)">📅 Month-wise Trend</button>
</div>

<div class="body">
  <div id="s-ov"  class="sec on"><div class="loader"><div class="spinner"></div>Loading…</div></div>
  <div id="s-esc" class="sec"></div>
  <div id="s-la"  class="sec"></div>
  <div id="s-aov" class="sec"></div>
  <div id="s-mom" class="sec"></div>
</div>
<script>
// =============================================================
//  Dashboard JS — calls /api/data (Vercel proxy, same-origin)
//  Apps Script URL is in api/data.js — NOT needed here
// =============================================================

// ── STATE ─────────────────────────────────────────────────────
let DB   = null;
let TAB  = 'ov';
let BKT  = 'all';
let SORT = { col:'del', dir:'desc' };
let CH   = {};
const PAL = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6',
             '#06b6d4','#f97316','#ec4899','#84cc16','#6366f1'];

// ── FETCH — calls /api/data (same-origin Vercel proxy) ───────
async function apiFetch(action) {
  const url = '/api/data?action=' + action;
  console.log('[dash] GET', url);
  let r;
  try {
    r = await fetch(url);
  } catch(netErr) {
    throw new Error('Network error on ' + action + ': ' + netErr.message);
  }
  const text = await r.text();
  console.log('[dash]', action, 'status=' + r.status, 'len=' + text.length);
  if (!r.ok) {
    throw new Error('HTTP ' + r.status + ' on ' + action + ': ' + text.slice(0,200));
  }
  let j;
  try { j = JSON.parse(text); }
  catch(e) { throw new Error('Bad JSON on ' + action + ': ' + text.slice(0,200)); }
  if (j && j.error) throw new Error(action + ' error: ' + j.error);
  return j;
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadData(retry) {
  retry = retry || 0;
  const msgs = [
    '⏳ Loading data from Google Sheets…',
    '⏳ Still loading — reading the Base sheet can take 20–30s on first load…',
    '⏳ Almost there — large dataset, hang tight…'
  ];
  document.getElementById('s-ov').innerHTML =
    `<div class="loader"><div class="spinner"></div>${msgs[Math.min(retry, 2)]}</div>`;
  document.getElementById('dataSubtitle').textContent = 'Loading…';
  console.log('[dash] loadData attempt', retry + 1);

  try {
    // ONE call returns meta + summary + wow + mom together (avoids 4× sheet reads → timeouts)
    const payload = await apiFetch('all');
    const { meta, summary, wow, mom } = payload;

    console.log('[dash] loaded — clients=' + meta?.clients?.length +
      ' weeks=' + wow?.weeks?.length + ' months=' + mom?.months?.length);

    if (!meta?.clients?.length) {
      throw new Error('No clients in response. Open /api/data?action=debug to diagnose.');
    }

    DB = { meta, summary, wow, mom };

    SEL_WEEKS  = meta.weeks.slice(-6);
    WEEK_MODE  = 'last6';
    SEL_CLIENTS = [];
    MIN_DEL    = 0;

    renderWeekList();
    renderClientList();
    updateWeekBtnLabel();
    updateClientBtnLabel();

    const lastMo = meta.months[meta.months.length - 1] || '';
    document.getElementById('dataSubtitle').textContent =
      'Jan 2026 – ' + lastMo + ' · ' + meta.clients.length +
      ' clients · Live · ' + new Date().toLocaleTimeString('en-IN');

    go();
    console.log('[dash] render complete');

  } catch (e) {
    console.error('[dash] loadData failed (attempt ' + (retry + 1) + '):', e);

    // Auto-retry once on 504 — second attempt hits Apps Script's 5-min cache
    if (e.message && e.message.includes('504') && retry < 1) {
      console.log('[dash] 504 → retrying in 4s (cache should be warm now)…');
      document.getElementById('s-ov').innerHTML =
        '<div class="loader"><div class="spinner"></div>⏳ First load timed out — retrying (cache warm-up)…</div>';
      await new Promise(r => setTimeout(r, 4000));
      return loadData(retry + 1);
    }

    showError(e.message);
  }
}

async function refreshData() {
  DB = null;
  await loadData();
}

function showError(msg) {
  document.getElementById('s-ov').innerHTML = `
    <div class="err-box">
      <strong>⚠ Could not load data</strong><br>${msg}<br><br>
      <strong>Debug links (open in new tab):</strong><br>
      <a href="/api/data?action=debug"  target="_blank">/api/data?action=debug</a> — sheet diagnostics<br>
      <a href="/api/data?action=all"    target="_blank">/api/data?action=all</a>   — full raw data<br><br>
      <strong>If you see 504 repeatedly:</strong><br>
      1. Open the Apps Script editor → Run <code>TEST_runDebug()</code> to warm the cache<br>
      2. Then reload this page — cached response is &lt;1s<br>
      3. Or deploy Apps Script with a trigger that pre-warms the cache every 4 min<br><br>
      <em>Check browser Console (F12) for detailed logs.</em>
    </div>`;
}

// ── PDF EXPORT — captures all 5 tabs into one multi-page PDF ──
async function downloadPdf() {
  if (!DB) { alert('Data still loading — please wait.'); return; }
  const btn = document.getElementById('pdfBtn');
  const origTxt = btn.innerHTML;
  btn.innerHTML = '⏳ Generating…';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('l', 'pt', 'a3'); // landscape A3 for wider tables
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 28;

    const tabOrder = [
      { id:'ov',  btn:0, title:'Overview' },
      { id:'esc', btn:1, title:'Escalation % WoW' },
      { id:'la',  btn:2, title:'Loss Accepted %' },
      { id:'aov', btn:3, title:'AOV & CPO' },
      { id:'mom', btn:4, title:'Month-wise Trend' }
    ];

    const tabButtons = document.querySelectorAll('.tab');
    const originalTab = TAB;

    for (let t = 0; t < tabOrder.length; t++) {
      const info = tabOrder[t];

      // Switch tab, wait for charts to animate
      sw(info.id, tabButtons[info.btn]);
      await new Promise(res => setTimeout(res, 900));

      const target = document.getElementById('s-' + info.id);

      // Temporarily expand all scrollable table containers so full content is captured
      const scrollBoxes = target.querySelectorAll('.tw');
      const origStyles = [];
      scrollBoxes.forEach(box => {
        origStyles.push(box.style.cssText);
        box.style.maxHeight = 'none';
        box.style.overflowY = 'visible';
      });

      await new Promise(res => setTimeout(res, 100)); // reflow

      const canvas = await html2canvas(target, {
        scale: 1.8,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false,
        windowWidth: 1400,
        scrollX: 0, scrollY: 0
      });

      // Restore scroll containers
      scrollBoxes.forEach((box, i) => { box.style.cssText = origStyles[i]; });

      const imgW  = pageW - margin * 2;
      const imgH  = (canvas.height * imgW) / canvas.width;
      const contentH = pageH - 50 - margin;

      if (t > 0) pdf.addPage();

      // Blue header strip
      pdf.setFillColor(59, 130, 246);
      pdf.rect(0, 0, pageW, 40, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFontSize(13); pdf.setFont(undefined, 'bold');
      pdf.text('Client Wise Summary  —  ' + info.title, margin, 26);
      pdf.setFontSize(8); pdf.setFont(undefined, 'normal');
      const ts = new Date().toLocaleString('en-IN', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
      pdf.text(ts, pageW - margin - 110, 26);

      let yOffset = 0;
      const startY = 50;

      while (yOffset < imgH) {
        if (yOffset > 0) {
          pdf.addPage();
          pdf.setFillColor(59, 130, 246);
          pdf.rect(0, 0, pageW, 40, 'F');
          pdf.setTextColor(255,255,255); pdf.setFontSize(13); pdf.setFont(undefined,'bold');
          pdf.text('Client Wise Summary  —  ' + info.title + '  (continued)', margin, 26);
          pdf.text(ts, pageW - margin - 110, 26);
        }

        const sliceH    = Math.min(contentH, imgH - yOffset);
        const srcY      = yOffset * (canvas.height / imgH);
        const srcH      = sliceH  * (canvas.height / imgH);

        const slice     = document.createElement('canvas');
        slice.width     = canvas.width;
        slice.height    = Math.ceil(srcH);
        slice.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);

        pdf.addImage(slice.toDataURL('image/png'), 'PNG', margin, startY, imgW, sliceH);
        yOffset += sliceH;
      }
    }

    // Restore original tab
    const origIdx = tabOrder.findIndex(x => x.id === originalTab);
    sw(originalTab, tabButtons[origIdx >= 0 ? origIdx : 0]);

    pdf.save('ClientWise_Dashboard_' + new Date().toISOString().slice(0,10) + '.pdf');
  } catch (err) {
    console.error('[PDF]', err);
    alert('PDF export failed: ' + err.message);
  } finally {
    btn.innerHTML = origTxt;
    btn.disabled  = false;
  }
}

// ── FILTERED CLIENTS (uses multi-select state) ────────────────
function filteredClients() {
  const sq = document.getElementById('srch').value.toLowerCase();
  return DB.meta.clients.filter(c => {
    if (!inBkt(c)) return false;
    if (SEL_CLIENTS.length && !SEL_CLIENTS.includes(c)) return false;
    if (sq && !c.toLowerCase().includes(sq)) return false;
    const s = DB.summary.clients[c];
    if (!s || s.del < MIN_DEL) return false;
    return true;
  });
}
function weekAgg(weeks, clients) {
  return weeks.map(wk => {
    const wc = DB.wow.week_client[wk] || {};
    let del=0,esc=0,loss=0,lv=0;
    clients.forEach(c => { const d=wc[c]; if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;} });
    return { wk, del, esc, loss, lv,
      escP: del>0?esc/del*100:0, laP: esc>0?loss/esc*100:0,
      cpo:  del>0?lv/del:0,      aov: loss>0?lv/loss:0 };
  });
}
function clientAgg(clients, weeks) {
  const out = {};
  clients.forEach(c => {
    let del=0,esc=0,loss=0,lv=0;
    weeks.forEach(wk => { const d=(DB.wow.week_client[wk]||{})[c]; if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;} });
    out[c] = { del, esc, loss, lv,
      escP: del>0?esc/del*100:0, laP: esc>0?loss/esc*100:0,
      cpo:  del>0?lv/del:0,      aov: loss>0?lv/loss:0 };
  });
  return out;
}

// ── SORT ──────────────────────────────────────────────────
function doSort(entries) {
  const {col, dir} = SORT;
  return [...entries].sort((a, b) => {
    const va = col==='name' ? a[0].toLowerCase() : (a[1][col]??0);
    const vb = col==='name' ? b[0].toLowerCase() : (b[1][col]??0);
    if (typeof va === 'string') return dir==='asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return dir==='desc' ? vb-va : va-vb;
  });
}
function clickSort(col) {
  SORT.dir = (SORT.col===col && SORT.dir==='desc') ? 'asc' : 'desc';
  SORT.col = col; go();
}
function th(col, lbl) {
  const a = SORT.col === col;
  return `<th class="${a?'sa':''}" onclick="clickSort('${col}')">${lbl}<span class="si">${a?(SORT.dir==='desc'?'▼':'▲'):'⇅'}</span></th>`;
}

// ── FORMAT ────────────────────────────────────────────────
function f(v, t) {
  if (v==null||isNaN(v)) return '—';
  if (t==='p')   return v.toFixed(2)+'%';
  if (t==='cpo') return '₹'+v.toFixed(2);                              // CPO/AOV — always exact 2 decimals
  if (t==='r')   return '₹'+v.toFixed(2);                               // currency — exact 2 decimals
  if (t==='rk')  { if(v>=1e7) return '₹'+(v/1e7).toFixed(2)+'Cr'; if(v>=1e5) return '₹'+(v/1e5).toFixed(1)+'L'; return '₹'+Math.round(v).toLocaleString('en-IN'); }
  if (t==='rv')  return '₹'+Math.round(v).toLocaleString('en-IN');      // exact rupee, whole number, no Cr/L abbreviation
  if (t==='n')   return Math.round(v).toLocaleString('en-IN');          // exact whole number — Del/Loss counts
  if (t==='nk')  { if(v>=1e6) return (v/1e6).toFixed(2)+'M'; if(v>=1e3) return (v/1e3).toFixed(1)+'K'; return Math.round(v).toLocaleString('en-IN'); }
  return Math.round(v).toLocaleString('en-IN');
}
function escCls(v){return v>=5?'pr':v>=2?'pa':v>=1?'pb':'pg';}
function laCls(v) {return v>=70?'pg':v>=40?'pb':v>=20?'pa':'pr';}
function badge(cur, prv, lG) {
  if (prv==null) return '';
  const d = cur-prv;
  if (Math.abs(d)<0.001) return '<span class="wow neu">→ 0.00%</span>';
  const better = lG ? d<0 : d>0;
  return `<span class="wow ${better?'dn':'up'}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(2)}%</span>`;
}
function bchip(c) {
  if (BKT!=='all') return '';
  const aj = new Set(DB.meta.ajio);
  return aj.has(c) ? '<span class="bchip ajio">AJIO</span>' : '<span class="bchip nonajio">Non-AJIO</span>';
}

const DL_PLUGIN = {
  id:'dl',
  afterDatasetsDraw(chart) {
    const {ctx} = chart;
    chart.data.datasets.forEach((ds, di) => {
      const meta = chart.getDatasetMeta(di);
      if (meta.hidden) return;
      meta.data.forEach((pt, i) => {
        const val = ds.data[i];
        if (val==null || val===0) return;
        const fmt = chart._fmtY || (v => '₹'+v.toFixed(2));
        const lbl = fmt(val);
        ctx.save();
        ctx.font = 'bold 9px Inter,sans-serif';
        ctx.fillStyle = ds.borderColor || ds.backgroundColor;
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(lbl, pt.x, pt.y - 6);
        ctx.restore();
      });
    });
  }
};
const HBAR_PLUGIN = {
  id:'hbl',
  afterDatasetsDraw(chart) {
    const {ctx, data} = chart;
    const meta = chart.getDatasetMeta(0);
    meta.data.forEach((bar, i) => {
      const val = data.datasets[0].data[i];
      if (!val) return;
      const fmt = chart._fmtY || (v => '₹'+v.toFixed(2));
      const lbl = fmt(val);
      ctx.save();
      ctx.font = 'bold 10px Inter,sans-serif';
      ctx.fillStyle = '#4a5568'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(lbl, bar.x + 6, bar.y);
      ctx.restore();
    });
  }
};

// ════════ OVERVIEW ════════
function renderOv() {
  const clients=filteredClients(), weeks=getWeeks();
  const agg=weekAgg(weeks,clients);
  const tD=agg.reduce((s,d)=>s+d.del,0), tE=agg.reduce((s,d)=>s+d.esc,0);
  const tL=agg.reduce((s,d)=>s+d.loss,0), tV=agg.reduce((s,d)=>s+d.lv,0);
  const eP=tD>0?tE/tD*100:0, lP=tE>0?tL/tE*100:0, cpo=tD>0?tV/tD:0, aov=tL>0?tV/tL:0;
  const ca=clientAgg(clients,weeks);
  const sorted=doSort(Object.entries(ca));
  const mx=Math.max(...Object.values(ca).map(d=>d.del),1);
  const lbs=agg.map(d=>d.wk.replace('2026-',''));
  let h=`<div class="krow">
    <div class="kpi k-blue"   style="animation-delay:.0s" ><div class="lb">Total Deliveries</div><div class="vl">${f(tD,'n')}</div><div class="sb">${clients.length} clients · ${weeks.length} wks</div></div>
    <div class="kpi k-red"    style="animation-delay:.05s"><div class="lb">Overall Esc %</div><div class="vl">${f(eP,'p')}</div><div class="sb">${f(tE,'n')} escalations</div></div>
    <div class="kpi k-green"  style="animation-delay:.1s" ><div class="lb">Overall LA %</div><div class="vl">${f(lP,'p')}</div><div class="sb">${f(tL,'n')} accepted</div></div>
    <div class="kpi k-amber"  style="animation-delay:.15s"><div class="lb">AOV</div><div class="vl">${f(aov,'cpo')}</div><div class="sb">Loss Amt ÷ Loss Count</div></div>
    <div class="kpi k-purple" style="animation-delay:.2s" ><div class="lb">Approx CPO</div><div class="vl">${f(cpo,'cpo')}</div><div class="sb">Loss Amt ÷ Del Count</div></div>
    <div class="kpi k-teal"   style="animation-delay:.25s"><div class="lb">Total Loss Value</div><div class="vl">${f(tV,'rv')}</div><div class="sb">${weeks.length} weeks</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Esc % — Week Trend</div><div style="position:relative;height:215px"><canvas id="ovEC"></canvas></div></div>
    <div class="card"><div class="card-title">LA % — Week Trend</div><div style="position:relative;height:215px"><canvas id="ovLC"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">Client Summary <span class="card-hint">↕ Click headers to sort &nbsp;·&nbsp; weekly delivery count shown per selected week</span></div>
  <div class="tw"><table><thead><tr>
    ${th('name','Client')}${th('del','Total Del')}${th('esc','Esc Count')}${th('escP','Esc %')}
    ${th('loss','Loss Count')}${th('laP','LA %')}${th('lv','Loss Value')}${th('aov','AOV')}${th('cpo','Approx CPO')}
    ${weeks.map(w=>`<th>${w.replace('2026-','')} Del</th>`).join('')}
  </tr></thead><tbody>`;
  sorted.forEach(([name,d])=>{
    const bar=`<span class="mbar" style="width:${Math.max(2,d.del/mx*55)}px;background:var(--blue);opacity:.3"></span>`;
    const weeklyDel = weeks.map(wk => {
      const wd = (DB.wow.week_client[wk]||{})[name];
      return `<td>${wd ? f(wd.del,'n') : '—'}</td>`;
    }).join('');
    h+=`<tr><td title="${name}">${name}${bchip(name)}</td><td>${f(d.del,'n')}${bar}</td><td>${f(d.esc,'n')}</td>
      <td><span class="pill ${escCls(d.escP)}">${f(d.escP,'p')}</span></td><td>${f(d.loss,'n')}</td>
      <td><span class="pill ${laCls(d.laP)}">${f(d.laP,'p')}</span></td><td>${f(d.lv,'rv')}</td>
      <td>${d.loss>0?f(d.aov,'cpo'):'—'}</td><td>${d.del>0?f(d.cpo,'cpo'):'—'}</td>${weeklyDel}</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-ov').innerHTML=h;
  lineChart('ovEC',lbs,[{label:'Esc %',color:'#ef4444',data:agg.map(d=>d.escP)}],v=>v.toFixed(2)+'%');
  lineChart('ovLC',lbs,[{label:'LA %',color:'#10b981',data:agg.map(d=>d.laP)}],v=>v.toFixed(2)+'%');
}

// ════════ ESC WoW ════════
function renderEsc() {
  const clients=filteredClients(), weeks=getWeeks();
  const agg=weekAgg(weeks,clients);
  const last=agg[agg.length-1], prev=agg[agg.length-2];
  const ca=clientAgg(clients,weeks);
  const active=Object.entries(ca).filter(([,d])=>d.del>0);
  const byEsc=[...active].sort((a,b)=>b[1].escP-a[1].escP);
  const top8=byEsc.slice(0,8).map(([c])=>c);
  const lbs=agg.map(d=>d.wk.replace('2026-',''));
  let h=`<div class="krow">
    <div class="kpi k-red"  style="animation-delay:.0s" ><div class="lb">Overall Esc %</div><div class="vl">${f(last.escP,'p')}</div><div class="sb">${badge(last.escP,prev?.escP,true)} vs prev wk</div></div>
    <div class="kpi k-red"  style="animation-delay:.05s"><div class="lb">Highest Esc %</div><div class="vl" style="font-size:13px;margin-top:3px">${byEsc[0]?.[0]||'—'}</div><div class="sb">${f(byEsc[0]?.[1]?.escP,'p')}</div></div>
    <div class="kpi k-red"  style="animation-delay:.1s" ><div class="lb">&gt;5% High</div><div class="vl">${Object.values(ca).filter(d=>d.escP>=5).length}</div><div class="sb"><span class="pill pr">clients</span></div></div>
    <div class="kpi k-amber" style="animation-delay:.15s"><div class="lb">2–5% Watch</div><div class="vl">${Object.values(ca).filter(d=>d.escP>=2&&d.escP<5).length}</div><div class="sb"><span class="pill pa">clients</span></div></div>
    <div class="kpi k-blue"  style="animation-delay:.2s" ><div class="lb">1–2% OK</div><div class="vl">${Object.values(ca).filter(d=>d.escP>=1&&d.escP<2).length}</div><div class="sb"><span class="pill pb">clients</span></div></div>
    <div class="kpi k-green" style="animation-delay:.25s"><div class="lb">&lt;1% Good</div><div class="vl">${Object.values(ca).filter(d=>d.del>0&&d.escP<1).length}</div><div class="sb"><span class="pill pg">clients</span></div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Overall Esc % &amp; Delivery Count — WoW</div><div style="position:relative;height:230px"><canvas id="escOC"></canvas></div></div>
    <div class="card"><div class="card-title">Top 8 Clients Esc % — WoW</div><div style="position:relative;height:230px"><canvas id="escCC"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">Client-wise Esc % — Week on Week <span class="card-hint">↕ Click headers to sort</span></div>
  <div class="tw"><table><thead><tr>
    ${th('name','Client')}${th('del','Deliveries')}${th('esc','Esc Count')}${th('escP','Esc %')}
    ${weeks.map(w=>`<th>${w.replace('2026-','')}</th><th>WoW Δ</th>`).join('')}
  </tr></thead><tbody>`;
  doSort(active).forEach(([name,d])=>{
    const wd=weeks.map(wk=>{const r=(DB.wow.week_client[wk]||{})[name]||{del:0,esc:0};return r.del>0?r.esc/r.del*100:0;});
    h+=`<tr><td title="${name}">${name}${bchip(name)}</td><td>${f(d.del,'n')}</td><td>${f(d.esc,'n')}</td>
      <td><span class="pill ${escCls(d.escP)}">${f(d.escP,'p')}</span></td>`;
    wd.forEach((v,i)=>{h+=`<td>${f(v,'p')}</td><td>${i>0?badge(v,wd[i-1],true):''}</td>`;});
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-esc').innerHTML=h;
  comboChart('escOC',lbs,
    { label:'Delivery Count', color:'#94a3b8', data:agg.map(d=>d.del) },
    { label:'Esc %', color:'#ef4444', data:agg.map(d=>d.escP) },
    v=>Math.round(v).toLocaleString('en-IN'), v=>v.toFixed(2)+'%', 230);
  lineChart('escCC',lbs,top8.map((c,i)=>({label:c,color:PAL[i%10],
    data:weeks.map(wk=>{const r=(DB.wow.week_client[wk]||{})[c]||{del:0,esc:0};return r.del>0?r.esc/r.del*100:null;})})),
    v=>v==null?'':v.toFixed(2)+'%',230);
}

// ════════ LA % ════════
function renderLA() {
  const clients=filteredClients(), weeks=getWeeks();
  const agg=weekAgg(weeks,clients);
  const last=agg[agg.length-1], prev=agg[agg.length-2];
  const ca=clientAgg(clients,weeks);
  const active=Object.entries(ca).filter(([,d])=>d.esc>0);
  const byLA=[...active].sort((a,b)=>b[1].laP-a[1].laP).slice(0,20);
  const lbs=agg.map(d=>d.wk.replace('2026-',''));
  let h=`<div class="krow">
    <div class="kpi k-green"  style="animation-delay:.0s" ><div class="lb">Overall LA %</div><div class="vl">${f(last.laP,'p')}</div><div class="sb">${badge(last.laP,prev?.laP,false)} vs prev wk</div></div>
    <div class="kpi k-green"  style="animation-delay:.05s"><div class="lb">Highest LA %</div><div class="vl" style="font-size:13px;margin-top:3px">${byLA[0]?.[0]||'—'}</div><div class="sb">${f(byLA[0]?.[1]?.laP,'p')}</div></div>
    <div class="kpi k-green"  style="animation-delay:.1s" ><div class="lb">&gt;70% Excellent</div><div class="vl">${active.filter(([,d])=>d.laP>=70).length}</div><div class="sb"><span class="pill pg">clients</span></div></div>
    <div class="kpi k-blue"   style="animation-delay:.15s"><div class="lb">40–70% Good</div><div class="vl">${active.filter(([,d])=>d.laP>=40&&d.laP<70).length}</div><div class="sb"><span class="pill pb">clients</span></div></div>
    <div class="kpi k-amber"  style="animation-delay:.2s" ><div class="lb">20–40% Watch</div><div class="vl">${active.filter(([,d])=>d.laP>=20&&d.laP<40).length}</div><div class="sb"><span class="pill pa">clients</span></div></div>
    <div class="kpi k-red"    style="animation-delay:.25s"><div class="lb">&lt;20% Low</div><div class="vl">${active.filter(([,d])=>d.laP<20).length}</div><div class="sb"><span class="pill pr">clients</span></div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Overall LA % — WoW</div><div style="position:relative;height:230px"><canvas id="laOC"></canvas></div></div>
    <div class="card"><div class="card-title">Top 20 by LA % (bar)</div><div style="position:relative;height:230px"><canvas id="laBrC"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">Client-wise LA % — Week on Week <span class="card-hint">↕ Click headers to sort</span></div>
  <div class="tw"><table><thead><tr>
    ${th('name','Client')}${th('del','Deliveries')}${th('esc','Esc Count')}${th('loss','Loss Count')}${th('laP','LA %')}
    ${weeks.map(w=>`<th>${w.replace('2026-','')}</th><th>WoW Δ</th>`).join('')}
  </tr></thead><tbody>`;
  doSort(active).forEach(([name,d])=>{
    const wd=weeks.map(wk=>{const r=(DB.wow.week_client[wk]||{})[name]||{esc:0,loss:0};return r.esc>0?r.loss/r.esc*100:0;});
    h+=`<tr><td title="${name}">${name}${bchip(name)}</td><td>${f(d.del,'n')}</td><td>${f(d.esc,'n')}</td><td>${f(d.loss,'n')}</td>
      <td><span class="pill ${laCls(d.laP)}">${f(d.laP,'p')}</span></td>`;
    wd.forEach((v,i)=>{h+=`<td>${f(v,'p')}</td><td>${i>0?badge(v,wd[i-1],false):''}</td>`;});
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-la').innerHTML=h;
  lineChart('laOC',lbs,[{label:'LA %',color:'#10b981',data:agg.map(d=>d.laP)}],v=>v.toFixed(2)+'%',230);
  hbar('laBrC',byLA.map(([c])=>c.length>18?c.slice(0,17)+'…':c),byLA.map(([,d])=>d.laP),
    byLA.map(([,d])=>d.laP>=70?'#10b98188':d.laP>=40?'#3b82f688':d.laP>=20?'#f59e0b88':'#ef444488'),
    v=>v.toFixed(1)+'%',230);
}

// ════════ AOV & CPO ════════
function renderAOV() {
  const clients=filteredClients(), weeks=getWeeks();
  const agg=weekAgg(weeks,clients);
  const last=agg[agg.length-1];
  const ca=clientAgg(clients,weeks);
  const withData=Object.entries(ca).filter(([,d])=>d.loss>0&&d.del>0);
  const byAov=[...withData].sort((a,b)=>b[1].aov-a[1].aov);
  const byCpo=[...withData].sort((a,b)=>b[1].cpo-a[1].cpo);
  const tV=agg.reduce((s,d)=>s+d.lv,0);
  const lbs=agg.map(d=>d.wk.replace('2026-',''));
  let h=`<div class="krow">
    <div class="kpi k-amber"  style="animation-delay:.0s" ><div class="lb">Overall AOV</div><div class="vl">${f(last.aov,'cpo')}</div><div class="sb">Loss Amt ÷ Loss Count</div></div>
    <div class="kpi k-purple" style="animation-delay:.05s"><div class="lb">Overall Approx CPO</div><div class="vl">${f(last.cpo,'cpo')}</div><div class="sb">Loss Amt ÷ Del Count</div></div>
    <div class="kpi k-amber"  style="animation-delay:.1s" ><div class="lb">Highest AOV</div><div class="vl" style="font-size:13px;margin-top:3px">${byAov[0]?.[0]||'—'}</div><div class="sb">${f(byAov[0]?.[1]?.aov,'cpo')}</div></div>
    <div class="kpi k-purple" style="animation-delay:.15s"><div class="lb">Highest CPO</div><div class="vl" style="font-size:13px;margin-top:3px">${byCpo[0]?.[0]||'—'}</div><div class="sb">${f(byCpo[0]?.[1]?.cpo,'cpo')}</div></div>
    <div class="kpi k-teal"   style="animation-delay:.2s" ><div class="lb">Total Loss Value</div><div class="vl">${f(tV,'rv')}</div><div class="sb">${weeks.length} weeks</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">AOV — WoW Trend</div><div style="position:relative;height:230px"><canvas id="aovTC"></canvas></div></div>
    <div class="card"><div class="card-title">Approx CPO — WoW Trend</div><div style="position:relative;height:230px"><canvas id="cpoTC"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Top 20 by AOV</div><div style="position:relative;height:280px"><canvas id="aovBC"></canvas></div></div>
    <div class="card"><div class="card-title">Top 20 by Approx CPO</div><div style="position:relative;height:280px"><canvas id="cpoBC"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">Client-wise AOV &amp; CPO <span class="card-hint">↕ Click headers to sort</span></div>
  <div class="tw"><table><thead><tr>
    ${th('name','Client')}${th('del','Del Count')}${th('loss','Loss Count')}${th('lv','Loss Value')}${th('aov','AOV')}${th('cpo','Approx CPO')}${th('laP','LA %')}${th('escP','Esc %')}
  </tr></thead><tbody>`;
  doSort(withData).forEach(([name,d])=>{
    h+=`<tr><td title="${name}">${name}${bchip(name)}</td><td>${f(d.del,'n')}</td><td>${f(d.loss,'n')}</td>
      <td>${f(d.lv,'rv')}</td><td><strong style="color:#d97706">${f(d.aov,'cpo')}</strong></td>
      <td><strong style="color:#7c3aed">${f(d.cpo,'cpo')}</strong></td>
      <td><span class="pill ${laCls(d.laP)}">${f(d.laP,'p')}</span></td>
      <td><span class="pill ${escCls(d.escP)}">${f(d.escP,'p')}</span></td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-aov').innerHTML=h;
  lineChart('aovTC',lbs,[{label:'AOV',color:'#f59e0b',data:agg.map(d=>d.aov)}],v=>'₹'+v.toFixed(2),230);
  lineChart('cpoTC',lbs,[{label:'CPO',color:'#8b5cf6',data:agg.map(d=>d.cpo)}],v=>'₹'+v.toFixed(2),230);
  hbar('aovBC',byAov.slice(0,20).map(([c])=>c.length>18?c.slice(0,17)+'…':c),byAov.slice(0,20).map(([,d])=>d.aov),byAov.slice(0,20).map((_,i)=>PAL[i%10]+'99'),v=>'₹'+v.toFixed(2));
  setTimeout(()=>hbar('cpoBC',byCpo.slice(0,20).map(([c])=>c.length>18?c.slice(0,17)+'…':c),byCpo.slice(0,20).map(([,d])=>d.cpo),byCpo.slice(0,20).map(([,d])=>d.cpo>=30?'#ef444488':d.cpo>=15?'#f59e0b88':d.cpo>=5?'#3b82f688':'#10b98188'),v=>'₹'+v.toFixed(2)),80);
}

// ════════ MoM ════════
function renderMom() {
  const clients=filteredClients();
  const monthAgg=DB.mom.months.map(m=>{
    let del=0,esc=0,loss=0,lv=0;
    clients.forEach(c=>{const d=m.clients[c];if(d){del+=d.del;esc+=d.esc;loss+=d.loss;lv+=d.lv;}});
    return{mo:m.mo,del,esc,loss,lv,
      escP:del>0?esc/del*100:0,laP:esc>0?loss/esc*100:0,cpo:del>0?lv/del:0,aov:loss>0?lv/loss:0};
  });
  const last=monthAgg[monthAgg.length-1], prev=monthAgg[monthAgg.length-2];
  const lbs=monthAgg.map(d=>d.mo);
  const top8=clients.slice(0,8);
  let h=`<div class="krow">
    <div class="kpi k-blue"   style="animation-delay:.0s" ><div class="lb">Latest Month</div><div class="vl">${last.mo}</div><div class="sb">${f(last.del,'n')} deliveries</div></div>
    <div class="kpi k-red"    style="animation-delay:.05s"><div class="lb">Esc % Latest</div><div class="vl">${f(last.escP,'p')}</div><div class="sb">${badge(last.escP,prev?.escP,true)} MoM</div></div>
    <div class="kpi k-green"  style="animation-delay:.1s" ><div class="lb">LA % Latest</div><div class="vl">${f(last.laP,'p')}</div><div class="sb">${badge(last.laP,prev?.laP,false)} MoM</div></div>
    <div class="kpi k-amber"  style="animation-delay:.15s"><div class="lb">AOV Latest</div><div class="vl">${f(last.aov,'cpo')}</div><div class="sb">Loss Amt ÷ Loss Count</div></div>
    <div class="kpi k-purple" style="animation-delay:.2s" ><div class="lb">CPO Latest</div><div class="vl">${f(last.cpo,'cpo')}</div><div class="sb">Loss Amt ÷ Del Count</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Esc % — MoM</div><div style="position:relative;height:230px"><canvas id="momEC"></canvas></div></div>
    <div class="card"><div class="card-title">LA % — MoM</div><div style="position:relative;height:230px"><canvas id="momLC"></canvas></div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">AOV — MoM</div><div style="position:relative;height:230px"><canvas id="momAC"></canvas></div></div>
    <div class="card"><div class="card-title">Approx CPO — MoM</div><div style="position:relative;height:230px"><canvas id="momCC"></canvas></div></div>
  </div>
  <div class="card"><div class="card-title">Esc % by Client — MoM (top 8 by volume)</div><div style="position:relative;height:260px"><canvas id="momCLC"></canvas></div></div>
  <div class="card"><div class="card-title">Month-wise Summary</div>
  <div class="tw"><table><thead><tr>
    <th>Month</th><th>Deliveries</th><th>Esc Count</th><th>Esc %</th><th>Loss Count</th><th>LA %</th><th>Loss Value</th><th>AOV</th><th>Approx CPO</th>
  </tr></thead><tbody>`;
  monthAgg.forEach((d,i)=>{
    const p=i>0?monthAgg[i-1]:null;
    h+=`<tr><td>${d.mo}</td><td>${f(d.del,'n')}</td><td>${f(d.esc,'n')}</td>
      <td>${f(d.escP,'p')} ${p?badge(d.escP,p.escP,true):''}</td>
      <td>${f(d.loss,'n')}</td><td>${f(d.laP,'p')} ${p?badge(d.laP,p.laP,false):''}</td>
      <td>${f(d.lv,'rv')}</td><td>${f(d.aov,'cpo')}</td><td>${f(d.cpo,'cpo')}</td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('s-mom').innerHTML=h;
  lineChart('momEC',lbs,[{label:'Esc %',color:'#ef4444',data:monthAgg.map(d=>d.escP)}],v=>v.toFixed(2)+'%',230);
  lineChart('momLC',lbs,[{label:'LA %',color:'#10b981',data:monthAgg.map(d=>d.laP)}],v=>v.toFixed(2)+'%',230);
  lineChart('momAC',lbs,[{label:'AOV',color:'#f59e0b',data:monthAgg.map(d=>d.aov)}],v=>'₹'+v.toFixed(2),230);
  lineChart('momCC',lbs,[{label:'CPO',color:'#8b5cf6',data:monthAgg.map(d=>d.cpo)}],v=>'₹'+v.toFixed(2),230);
  lineChart('momCLC',lbs,top8.map((c,i)=>({label:c,color:PAL[i%10],
    data:DB.mom.months.map(m=>{const d=m.clients[c];return d&&d.del>0?d.esc/d.del*100:null;})})),
    v=>v==null?'':v.toFixed(2)+'%',260);
}

// ── START ─────────────────────────────────────────────────
loadData();
</script>
